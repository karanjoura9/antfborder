<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=3.0, user-scalable=yes" />
  <title>Office Live Updates Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
      overflow: hidden;
      height: 100vh;
    }

    .header {
      height: auto;
      min-height: 70px;
      background: #1e293b;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 25px;
      border-bottom: 3px solid #38bdf8;
      flex-wrap: wrap;
      gap: 10px;
    }

    .header h1 {
      font-size: 30px;
      color: #38bdf8;
      letter-spacing: 1px;
      flex-shrink: 1;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .datetime {
      font-size: 22px;
      font-weight: bold;
      white-space: nowrap;
    }

    .logo {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #38bdf8;
      background: white;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr 2fr;
      grid-template-areas:
        "officers thismonth hearings-today"
        "duty thismonth hearings-carousel";
      
      row-gap: 8px;
      column-gap: 8px;
      padding: 8px;
      height: calc(100vh - 120px);
      overflow-y: auto;
      overflow-x: hidden;
    }

    .card {
      background: #1e293b;
      border-radius: 8px;
      padding: 8px;
      overflow: hidden;
      border: 2px solid #334155;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
    }

    .card h2 {
      margin-bottom: 6px;
      color: #38bdf8;
      border-bottom: 2px solid #334155;
      padding-bottom: 4px;
      font-size: 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: auto;
      word-wrap: break-word;
    }

    th, td {
      padding: 4px;
      text-align: left;
      border-bottom: 1px solid #334155;
      font-size: 13px;
      word-break: break-word;
    }

    th {
      background: #0f172a;
      color: #38bdf8;
      position: sticky;
      top: 0;
    }

    ul {
      list-style: none;
    }

    ul li {
      padding: 5px;
      margin-bottom: 4px;
      background: #0f172a;
      border-left: 4px solid #38bdf8;
      font-size: 13px;
      border-radius: 4px;
      line-height: 1.3;
    }

    .highlight {
      color: #facc15;
      font-weight: bold;
    }

    .footer-marquee {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #dc2626;
      color: white;
      height: 50px;
      display: flex;
      align-items: center;
      overflow: hidden;
      white-space: nowrap;
      border-top: 3px solid white;
    }

    .marquee-content {
      display: inline-block;
      white-space: nowrap;
      word-break: keep-all;
      overflow-wrap: normal;
      flex-wrap: nowrap;
      min-width: max-content;
      padding-left: 100%;
      animation: marquee 25s linear infinite;
      font-size: 28px;
      font-weight: bold;
    }

    @keyframes marquee {
      0% {
        transform: translateX(0%);
      }

      100% {
        transform: translateX(-100%);
      }
    }

    .scrollable {
      height: auto;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      max-height: 100%;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .scrollable::-webkit-scrollbar {
      display: none;
    }

    .scroll-content {
      width: 100%;
      display: block;
    }

    /* Auto-scroll marquee for Past FIRs */
    .auto-scroll {
      overflow: hidden !important;
      position: relative;
    }

    .auto-scroll .scroll-content {
      animation: autoScrollVertical 20s linear infinite;
    }

    .auto-scroll .scroll-content:hover {
      animation-play-state: paused;
    }

    @keyframes autoScrollVertical {
      0% {
        transform: translateY(0);
      }
      100% {
        transform: translateY(-50%);
      }
    }

    .status-green {
      color: #4ade80;
      font-weight: bold;
    }

    .status-red {
      color: #f87171;
      font-weight: bold;
    }

    .status-yellow {
      color: #facc15;
      font-weight: bold;
    }

    /* Hearings animation */
    .hearing-content {
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      0% {
        opacity: 0;
        transform: translateY(10px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hearing-indicator {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: bold;
      margin-left: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .hearing-indicator.yesterday {
      background: rgba(156, 163, 175, 0.2);
      color: #9ca3af;
    }

    .hearing-indicator.today {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }

    .hearing-indicator.tomorrow {
      background: rgba(250, 204, 21, 0.2);
      color: #facc15;
    }

    /* Carousel progress bars */
    .carousel-indicators {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 12px 0 6px 0;
      margin-top: auto;
    }

    .carousel-bar {
      flex: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .carousel-bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      transition: width 0.3s ease, background 0.3s ease;
    }

    .carousel-bar.yesterday-bar .carousel-bar-fill {
      background: linear-gradient(90deg, rgba(156, 163, 175, 0.3), #9ca3af);
    }

    .carousel-bar.today-bar .carousel-bar-fill {
      background: linear-gradient(90deg, rgba(34, 197, 94, 0.3), #22c55e);
    }

    .carousel-bar.tomorrow-bar .carousel-bar-fill {
      background: linear-gradient(90deg, rgba(250, 204, 21, 0.3), #facc15);
    }

    .carousel-bar.active .carousel-bar-fill {
      width: 100%;
      box-shadow: 0 0 8px currentColor;
    }

    .carousel-bar:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: scaleY(1.3);
    }

    .carousel-bar.yesterday-bar:hover {
      background: rgba(156, 163, 175, 0.2);
    }

    .carousel-bar.today-bar:hover {
      background: rgba(34, 197, 94, 0.2);
    }

    .carousel-bar.tomorrow-bar:hover {
      background: rgba(250, 204, 21, 0.2);
    }

    .progress-bar-container {
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 6px;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #38bdf8, #22c55e);
      border-radius: 2px;
      transition: width 0.1s linear;
      width: 0%;
    }

    .carousel-label {
      display: flex;
      justify-content: space-between;
      padding: 0 2px;
      margin-top: 6px;
    }

    .carousel-label span {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .carousel-label .next-up {
      color: #38bdf8;
      font-weight: bold;
    }

    /* ===================== RESPONSIVE DESIGN ===================== */

    /* Tablet and smaller desktop (1024px and below) */
    @media (max-width: 1024px) {
      .header h1 {
        font-size: 22px;
      }

      .datetime {
        font-size: 16px;
      }

      .logo {
        width: 45px;
        height: 45px;
      }

      .container {
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
          "officers duty"
          "thismonth thismonth"
          "hearings-today hearings-today"
          "hearings-carousel hearings-carousel";
        height: calc(100vh - 120px);
        overflow-y: auto;
      }

      .card h2 {
        font-size: 18px;
      }

      th, td {
        font-size: 12px;
        padding: 5px;
      }

      ul li {
        font-size: 12px;
        padding: 6px;
      }

      .scrollable {
        max-height: 180px !important;
      }

      .marquee-content {
        font-size: 22px;
      }
    }

    /* Mobile devices (768px and below) */
    @media (max-width: 768px) {
      body {
        overflow: hidden;
        height: 100vh;
      }

      .header {
        height: auto;
        min-height: 60px;
        padding: 10px 15px;
        flex-wrap: wrap;
      }

      .header h1 {
        font-size: 18px;
        width: 100%;
        text-align: center;
        margin-bottom: 8px;
      }

      .header-right {
        width: 100%;
        justify-content: center;
        gap: 12px;
      }

      .datetime {
        font-size: 12px;
      }

      .logo {
        width: 35px;
        height: 35px;
      }

      .container {
        grid-template-columns: 1fr;
        grid-template-areas:
          "officers"
          "duty"
          "thismonth"
          "hearings-today"
          "hearings-carousel";
        height: calc(100vh - 120px);
        padding: 8px;
        row-gap: 10px;
        overflow-y: auto;
      }

      .card {
        padding: 10px;
        min-height: auto !important;
      }

      .card h2 {
        font-size: 16px;
        margin-bottom: 6px;
      }

      th, td {
        font-size: 11px;
        padding: 4px;
      }

      ul li {
        font-size: 11px;
        padding: 5px;
        margin-bottom: 4px;
      }

      .scrollable {
        max-height: 180px !important;
      }

      .carousel-indicators {
        padding: 10px 0 4px 0;
        gap: 6px;
      }

      .carousel-bar {
        height: 5px;
      }

      .carousel-label span {
        font-size: 8px;
      }

      .footer-marquee {
        height: 40px;
      }

      .marquee-content {
        font-size: 16px;
      }
    }

    /* Small mobile devices (480px and below) */
    @media (max-width: 480px) {
      .header h1 {
        font-size: 14px;
      }

      .datetime {
        font-size: 10px;
      }

      .logo {
        width: 30px;
        height: 30px;
      }

      .container {
        padding: 6px;
        row-gap: 8px;
      }

      .card {
        padding: 8px;
        border-radius: 8px;
      }

      .card h2 {
        font-size: 14px;
        padding-bottom: 4px;
      }

      th, td {
        font-size: 10px;
        padding: 3px;
      }

      ul li {
        font-size: 10px;
        padding: 4px;
        border-left-width: 3px;
      }

      .scrollable {
        max-height: 180px !important;
      }

      .carousel-indicators {
        padding: 8px 0 3px 0;
        gap: 5px;
      }

      .carousel-bar {
        height: 4px;
      }

      .carousel-label span {
        font-size: 7px;
      }

      .footer-marquee {
        height: 35px;
      }

      .marquee-content {
        font-size: 14px;
      }
    }

    /* Zoom level adjustments */
    @media (min-resolution: 120dpi) and (max-resolution: 150dpi) {
      .container {
        height: calc(100vh - 120px);
        overflow-y: auto;
      }

      .card {
        overflow: visible;
      }
    }

    @media (min-resolution: 150dpi) {
      body {
        overflow: hidden;
        height: 100vh;
      }

      .container {
        height: calc(100vh - 120px);
        overflow-y: auto;
      }

      .card {
        overflow: visible;
      }

      .scrollable {
        max-height: 180px !important;
      }
    }

    /* Ensure content is visible on very large screens */
    @media (min-width: 1920px) {
      .header h1 {
        font-size: 36px;
      }

      .datetime {
        font-size: 26px;
      }

      .logo {
        width: 65px;
        height: 65px;
      }

      .card h2 {
        font-size: 24px;
      }

      th, td {
        font-size: 16px;
        padding: 8px;
      }

      ul li {
        font-size: 16px;
        padding: 9px;
      }

      .marquee-content {
        font-size: 32px;
      }

      .footer-marquee {
        height: 60px;
      }
    }

    /* Landscape orientation on mobile devices */
    @media (max-height: 600px) and (orientation: landscape) {
      .header {
        min-height: 50px;
        padding: 5px 15px;
      }

      .header h1 {
        font-size: 16px;
      }

      .datetime {
        font-size: 12px;
      }

      .logo {
        width: 35px;
        height: 35px;
      }

      .container {
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        grid-template-areas: none;
        padding: 8px;
        height: calc(100vh - 85px);
        overflow-y: auto;
      }

      .card {
        grid-area: auto !important;
        height: auto !important;
        max-height: 180px;
      }

      .scrollable {
        max-height: 180px !important;
      }

      .footer-marquee {
        height: 35px;
      }

      .marquee-content {
        font-size: 14px;
      }
    }

    /* Print styles */
    @media print {
      .footer-marquee {
        display: none;
      }

      body {
        overflow: visible;
        height: auto;
      }

      .container {
        height: auto;
        overflow: visible;
        grid-template-columns: 1fr 1fr;
      }

      .card {
        break-inside: avoid;
        page-break-inside: avoid;
      }
    }
  </style>
</head>
<body>

  <script>
    function updateDateTime() {
      const now = new Date();
      const options = {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      };

      document.getElementById('datetime').innerHTML =
        now.toLocaleDateString('en-IN', options);
    }

    setInterval(updateDateTime, 1000);
    updateDateTime();

    // Set Dashboard Title
    document.getElementById('dashboard-title').innerText = dashboardTitle;

    // Set Logo
    document.getElementById('header-logo').src = logoUrl;

    // Populate FIR Table
    const firTable = document.getElementById('this-month-fir-table-body');

    thisMonthFirs.forEach(fir => {
      firTable.innerHTML += `
        <tr>
          <td>${fir.number}</td>
          <td>${fir.sections}</td>
          <td class="highlight">${fir.deadline}</td>
        </tr>
      `;
    });

    // Populate Officers
    document.getElementById('officers-list').innerHTML = `
      <li><span class="highlight">SP ANTF Border Range:</span> ${officers.sp}</li>
      <li><span class="highlight">DSP:</span> ${officers.dsp1}</li>
      <li><span class="highlight">DSP:</span> ${officers.dsp2}</li>
      
    `;

    // Populate Duty Officer
    document.getElementById('duty-officer-list').innerHTML = `
      <li><span class="highlight">Duty Officer:</span> ${dutyOfficer.officer}</li>
      <li><span class="highlight">Nigrani Duty:</span> ${dutyOfficer.nigrani}</li>
    `;

    // Populate Today Hearings (Static)
    const todayHearingList = document.getElementById('today-hearing-list');
    todayHearings.forEach(item => {
      todayHearingList.innerHTML += `<li>${item}</li>`;
    });

    // Rotating Hearings Section (Yesterday/Tomorrow only)
    const hearings = [
      { type: 'yesterday', title: 'Yesterday Hearings', data: yesterdayHearings, class: 'yesterday' },
      { type: 'tomorrow', title: 'Tomorrow Hearings', data: tomorrowHearings, class: 'tomorrow' }
    ];

    let currentHearingIndex = 0; // Start with Yesterday
    let progressInterval;
    const ROTATION_TIME = 10000; // 10 seconds
    let startTime;

    function updateHearings() {
      const hearing = hearings[currentHearingIndex];
      const hearingList = document.getElementById('hearing-list');
      const hearingTitle = document.getElementById('hearing-title');
      const hearingIndicator = document.getElementById('hearing-indicator');
      const hearingContent = document.getElementById('hearing-content');

      // Trigger fade animation
      hearingContent.style.animation = 'none';
      setTimeout(() => {
        hearingContent.style.animation = 'fadeIn 1s ease-in-out';
      }, 10);

      // Update title and indicator
      hearingTitle.textContent = hearing.title;
      hearingIndicator.textContent = hearing.type.toUpperCase();
      hearingIndicator.className = `hearing-indicator ${hearing.class}`;

      // Update list content
      hearingList.innerHTML = '';
      hearing.data.forEach(item => {
        hearingList.innerHTML += `<li>${item}</li>`;
      });

      // Update carousel bars
      document.querySelectorAll('.carousel-bar').forEach((bar, index) => {
        bar.classList.toggle('active', index === currentHearingIndex);
      });

      // Update labels
      const nextIndex = (currentHearingIndex + 1) % hearings.length;
      document.getElementById('current-label').textContent = hearing.type.charAt(0).toUpperCase() + hearing.type.slice(1);
      document.getElementById('next-label').textContent = hearings[nextIndex].type.charAt(0).toUpperCase() + hearings[nextIndex].type.slice(1);

      // Reset progress bar
      const progressBar = document.getElementById('hearing-progress');
      progressBar.style.width = '0%';
      
      // Start progress animation
      startTime = Date.now();
      if (progressInterval) clearInterval(progressInterval);
      
      progressInterval = setInterval(() => {
        const elapsed = Date.now() - startTime;
        const progress = Math.min((elapsed / ROTATION_TIME) * 100, 100);
        progressBar.style.width = progress + '%';
        
        if (progress >= 100) {
          clearInterval(progressInterval);
        }
      }, 50);

      // Move to next hearing
      currentHearingIndex = (currentHearingIndex + 1) % hearings.length;
    }

    // Manual navigation via progress bars
    document.querySelectorAll('.carousel-bar').forEach((bar, index) => {
      bar.addEventListener('click', () => {
        currentHearingIndex = index;
        updateHearings();
        // Restart auto-rotation timer
        clearInterval(autoRotateInterval);
        autoRotateInterval = setInterval(updateHearings, ROTATION_TIME);
      });
    });

    // Initialize with Today's hearings
    updateHearings();

    // Auto-rotate every 10 seconds
    let autoRotateInterval = setInterval(updateHearings, ROTATION_TIME);

    // Set Marquee
    document.getElementById('marquee-text').textContent = marqueeText.replace(/\n/g, ' ');

    // Auto-reload page every 2 minutes
    setTimeout(() => {
      location.reload();
    }, 120000); // 2 minutes = 120,000 milliseconds
  </script>

</body>
</html>

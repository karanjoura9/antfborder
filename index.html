<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Office Live Updates Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
      overflow: hidden;
    }

    .header {
      height: 70px;
      background: #1e293b;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 25px;
      border-bottom: 3px solid #38bdf8;
    }

    .header h1 {
      font-size: 30px;
      color: #38bdf8;
      letter-spacing: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .datetime {
      font-size: 22px;
      font-weight: bold;
    }

    .logo {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #38bdf8;
      background: white;
    }

    .container {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      grid-template-areas:
        "thismonth officers duty"
        "past today today"
        "past yesterday tomorrow";
      row-gap: 4px;
      column-gap: 12px;
      padding: 12px;
      height: calc(100vh - 150px);
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 12px;
      overflow: hidden;
      border: 2px solid #334155;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
    }

    .card h2 {
      margin-bottom: 8px;
      color: #38bdf8;
      border-bottom: 2px solid #334155;
      padding-bottom: 6px;
      font-size: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 6px;
      text-align: left;
      border-bottom: 1px solid #334155;
      font-size: 14px;
    }

    th {
      background: #0f172a;
      color: #38bdf8;
      position: sticky;
      top: 0;
    }

    ul {
      list-style: none;
    }

    ul li {
      padding: 7px;
      margin-bottom: 6px;
      background: #0f172a;
      border-left: 5px solid #38bdf8;
      font-size: 14px;
      border-radius: 5px;
      line-height: 1.3;
    }

    .highlight {
      color: #facc15;
      font-weight: bold;
    }

    .footer-marquee {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #dc2626;
      color: white;
      height: 100px;
      display: flex;
      align-items: center;
      overflow: hidden;
      white-space: nowrap;
      border-top: 3px solid white;
    }

    .marquee-content {
      display: inline-block;
      white-space: nowrap;
      word-break: keep-all;
      overflow-wrap: normal;
      flex-wrap: nowrap;
      min-width: max-content;
      padding-left: 100%;
      animation: marquee 25s linear infinite;
      font-size: 60px;
      font-weight: bold;
    }

    @keyframes marquee {
      0% {
        transform: translateX(0%);
      }

      100% {
        transform: translateX(-100%);
      }
    }

    .scrollable {
      height: 120px;
      overflow: hidden;
      position: relative;
    }

    .scroll-content {
      position: absolute;
      width: 100%;
      display: block;
      animation: verticalMarquee 15s linear infinite;
    }

    .scroll-content:hover {
      animation-play-state: paused;
    }

    @keyframes verticalMarquee {
      0% {
        transform: translateY(100%);
      }

      100% {
        transform: translateY(-100%);
      }
    }

    .status-green {
      color: #4ade80;
      font-weight: bold;
    }

    .status-red {
      color: #f87171;
      font-weight: bold;
    }

    .status-yellow {
      color: #facc15;
      font-weight: bold;
    }

      50% {
        opacity: 0.2;
        transform: scale(1.3);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>

  <script>
    // ==============================
    // EDIT ONLY THESE VARIABLES
    // ==============================

    const dashboardTitle = "ANTF BORDER RANGE LIVE DASHBOARD";

    const logoUrl = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_Z08aU8cOEy24m5aKdL9R3XcxpjqkTz5WzQ&s";

    const officers = {
      sp: "Gurpreet Singh PPS",
      dsp1: "Arun Sharma",
      dsp2: "Sushil Kumar PPS"
    };

    const thisMonthFirs = [
      {
        number: "22/2026",
        sections: "21-C NDPS",
        status: "Under Investigation",
        className: "status-green"
      },
      {
        number: "43/2026",
        sections: "27-A NDPS",
        status: "Pending",
        className: "status-yellow"
      },
      {
        number: "58/2026",
        sections: "420 IPC",
        status: "Urgent",
        className: "status-red"
      }
    ];

    const pastFirs = [
      {
        number: "11/2025",
        sections: "29 NDPS",
        status: "Chargesheet Filed",
        className: "status-green"
      },
      {
        number: "18/2025",
        sections: "25 Arms Act",
        status: "Disposed",
        className: "status-yellow"
      },
      {
        number: "31/2025",
        sections: "420 IPC",
        status: "Conviction",
        className: "status-red"
      }
    ];

    const yesterdayHearings = [
      "State vs Harpreet Singh – Evidence recorded successfully.",
      "NDPS Case FIR 22/2026 – Property attachment hearing completed.",
      "Cross-border trafficking matter adjourned for further arguments.",
      "Witness statements recorded in organized narcotics syndicate case."
    ];

    const todayHearings = [
      "FIR 43/2026 listed before Special NDPS Court at 11:00 AM.",
      "Bail hearing in interstate narcotics trafficking case at 1:30 PM.",
      "Financial investigation status report submission scheduled today.",
      "Arguments regarding confiscation proceedings under NDPS Act underway."
    ];

    const tomorrowHearings = [
      "Production warrants for accused persons to be executed tomorrow.",
      "Court hearing regarding seized property verification scheduled.",
      "Special public prosecutor meeting fixed before court proceedings.",
      "Witness cross-examination in international narco module case listed tomorrow."
    ];

    const dutyOfficer = {
      officer: "SI Baljinder Singh",
      nigrani: "Ct Gurjant Singh"
    };

    const achievements = [];

    const marqueeText = `
      IMPORTANT UPDATE • ANTF Border Range Intensifies Anti Narcotics Operations •
      SP Gurpreet Singh PPS Monitoring All Field Units •
      Special Nakas Active Across Border Areas •
      Intelligence Sharing Strengthened •
      Daily Operational Reports Mandatory Before 5 PM •
      
    `;
  </script>

  <div class="header">
    <h1 id="dashboard-title"></h1>

    <div class="header-right">
      <div class="datetime" id="datetime"></div>
      <img id="header-logo" class="logo" src="" alt="Logo">
    </div>
  </div>

  <div class="container">

    <!-- FIR SECTION -->
    <div class="card" style="grid-area: thismonth; height: 200px; margin-bottom: -6px;">
      <h2>This Month FIRs</h2>
      <div class="scrollable" style="height: 130px;">
      <div class="scroll-content">
      <table>
        <thead>
          <tr>
            <th>FIR No.</th>
            <th>Sections</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="this-month-fir-table-body"></tbody>
      </table>
      </div>
      </div>
    </div>

    <!-- OUR OFFICERS -->

    <!-- OUR OFFICERS -->
    <div class="card" style="grid-area: officers;">
      <h2>Our Officers</h2>
      <div>
        <ul id="officers-list"></ul>
      </div>
    </div>

    <!-- DUTY OFFICER -->
    <div class="card" style="grid-area: duty;">
      <h2>Duty Officer</h2>
      <div>
        <ul id="duty-officer-list"></ul>
      </div>
    </div>

    <!-- PAST FIRs -->
    <div class="card" style="grid-area: past; height: 520px; margin-top: -6px;">
      <h2>Past FIRs</h2>

      <div class="scrollable" style="height: 440px;">
        <div class="scroll-content">
          <table>
            <thead>
              <tr>
                <th>FIR No.</th>
                <th>Sections</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="past-fir-table-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- YESTERDAY HEARINGS -->
    <div class="card" style="grid-area: yesterday;">
      <h2>Yesterday Hearings</h2>

      <div class="scrollable">
        <div class="scroll-content">
          <ul id="yesterday-list"></ul>
        </div>
      </div>
    </div>

    <!-- TODAY HEARINGS -->
    <div class="card" style="grid-area: today;">
      <h2>Today Hearings</h2>

      <div class="scrollable">
        <div class="scroll-content">
          <ul id="today-list"></ul>
        </div>
      </div>
    </div>

    <!-- TOMORROW HEARINGS -->
    <div class="card" style="grid-area: tomorrow;">
      <h2>Tomorrow Hearings</h2>

      <div class="scrollable">
        <div class="scroll-content">
          <ul id="tomorrow-list"></ul>
        </div>
      </div>
    </div>

  </div>
    </div>

  </div>

  <!-- FOOTER MARQUEE -->
  <div class="footer-marquee">
    <div class="marquee-content" id="marquee-text"></div>
  </div>

  <script>
    function updateDateTime() {
      const now = new Date();
      const options = {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      };

      document.getElementById('datetime').innerHTML =
        now.toLocaleDateString('en-IN', options);
    }

    setInterval(updateDateTime, 1000);
    updateDateTime();

    // Set Dashboard Title
    document.getElementById('dashboard-title').innerText = dashboardTitle;

    // Set Logo
    document.getElementById('header-logo').src = logoUrl;

    // Populate FIR Table
    const firTable = document.getElementById('this-month-fir-table-body');

    thisMonthFirs.forEach(fir => {
      firTable.innerHTML += `
        <tr>
          <td>${fir.number}</td>
          <td>${fir.sections}</td>
          <td class="${fir.className}">${fir.status}</td>
        </tr>
      `;
    });

    // Populate Officers
    document.getElementById('officers-list').innerHTML = `
      <li><span class="highlight">SP ANTF Border Range:</span> ${officers.sp}</li>
      <li><span class="highlight">DSP:</span> ${officers.dsp1}</li>
      <li><span class="highlight">DSP:</span> ${officers.dsp2}</li>
      
    `;

    // Populate Duty Officer
    document.getElementById('duty-officer-list').innerHTML = `
      <li><span class="highlight">Duty Officer:</span> ${dutyOfficer.officer}</li>
      <li><span class="highlight">Nigrani Duty:</span> ${dutyOfficer.nigrani}</li>
    `;
    // Populate Past FIR Table
    const pastFirTable = document.getElementById('past-fir-table-body');

    pastFirs.forEach(fir => {
      pastFirTable.innerHTML += `
        <tr>
          <td>${fir.number}</td>
          <td>${fir.sections}</td>
          <td class="${fir.className}">${fir.status}</td>
        </tr>
      `;
    });

    // Populate Yesterday Hearings
    const yesterdayList = document.getElementById('yesterday-list');

    yesterdayHearings.forEach(item => {
      yesterdayList.innerHTML += `<li>${item}</li>`;
    });

    // Populate Today Hearings
    const todayList = document.getElementById('today-list');

    todayHearings.forEach(item => {
      todayList.innerHTML += `<li>${item}</li>`;
    });

    // Populate Tomorrow Hearings
    const tomorrowList = document.getElementById('tomorrow-list');

    tomorrowHearings.forEach(item => {
      tomorrowList.innerHTML += `<li>${item}</li>`;
    });

    // Set Marquee
    document.getElementById('marquee-text').textContent = marqueeText.replace(/\n/g, ' ');
  </script>

</body>
</html>

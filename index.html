<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=3.0, user-scalable=yes" />
  <title>Office Live Updates Dashboard</title>

  <style>
    :root {
      --footer-height: 50px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.20), transparent 28%),
        radial-gradient(circle at 85% 15%, rgba(250, 204, 21, 0.16), transparent 24%),
        radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.14), transparent 26%),
        linear-gradient(135deg, #07111f 0%, #0f172a 48%, #111827 100%);
      color: white;
      overflow: hidden;
      height: 100vh;
      position: relative;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background:
        linear-gradient(120deg, rgba(255, 255, 255, 0.05), transparent 35%),
        linear-gradient(300deg, rgba(56, 189, 248, 0.05), transparent 40%);
      mix-blend-mode: screen;
      animation: ambientShift 14s ease-in-out infinite alternate;
    }

    body::after {
      background-image:
        url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_Z08aU8cOEy24m5aKdL9R3XcxpjqkTz5WzQ&s');
      background-repeat: no-repeat;
      background-position: center center;
      background-size: min(78vw, 980px);
      opacity: 0.07;
      filter: saturate(0.9) contrast(1.05);
      mix-blend-mode: soft-light;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), transparent 92%);
    }

    @keyframes ambientShift {
      0% {
        transform: translate3d(-1.5%, -1%, 0) scale(1);
      }

      100% {
        transform: translate3d(1.5%, 1%, 0) scale(1.03);
      }
    }

    .header {
      height: auto;
      min-height: 70px;
      background: rgba(15, 23, 42, 0.72);
      backdrop-filter: blur(18px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 25px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.22);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.24);
      flex-wrap: wrap;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .header h1 {
      font-size: 30px;
      color: #f8fafc;
      letter-spacing: 1px;
      flex-shrink: 1;
      text-shadow: 0 0 20px rgba(56, 189, 248, 0.25);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .datetime {
      font-size: 22px;
      font-weight: bold;
      white-space: nowrap;
      color: #cbd5e1;
    }

    .logo {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(56, 189, 248, 0.75);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 0 0 6px rgba(56, 189, 248, 0.08), 0 0 28px rgba(56, 189, 248, 0.18);
    }

    .logo-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
      pointer-events: none;
      z-index: 25;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.45s ease, visibility 0.45s ease;
    }

    .logo-overlay::before {
      content: '';
      position: absolute;
      width: min(58vw, 420px);
      height: min(58vw, 420px);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.18), transparent 60%);
      filter: blur(10px);
      opacity: 0;
      transform: scale(0.7);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .logo-overlay::after {
      content: '';
      position: absolute;
      width: min(72vw, 520px);
      height: 3px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.85), rgba(56, 189, 248, 0.75), transparent);
      opacity: 0;
      transform: translateX(-24%) rotate(-12deg);
      filter: blur(0.5px);
      transition: opacity 0.35s ease;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.35);
    }

    .logo-overlay.visible {
      opacity: 1;
      visibility: visible;
    }

    .logo-overlay.visible::before {
      opacity: 1;
      transform: scale(1);
    }

    .logo-overlay.visible::after {
      opacity: 1;
      animation: logoSweep 1.1s ease-out infinite;
    }

    .logo-overlay img {
      width: min(38vw, 280px);
      height: min(38vw, 280px);
      object-fit: contain;
      filter: drop-shadow(0 0 18px rgba(56, 189, 248, 0.16)) drop-shadow(0 12px 24px rgba(0, 0, 0, 0.28));
      opacity: 0.72;
      backface-visibility: hidden;
      transform-style: preserve-3d;
      animation: logoNewsReveal 1.35s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes logoNewsReveal {
      0% {
        opacity: 0;
        transform: translateY(24px) scale(0.72);
      }

      45% {
        opacity: 1;
        transform: translateY(-4px) scale(1.08);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes logoSweep {
      0% {
        transform: translateX(-36%) rotate(-12deg);
        opacity: 0;
      }

      20% {
        opacity: 1;
      }

      100% {
        transform: translateX(36%) rotate(-12deg);
        opacity: 0;
      }
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr 1.6fr 1fr;
      grid-template-areas:
        "officers achievements hearings-today duty"
        "thismonth achievements hearings-carousel duty";
      
      row-gap: 8px;
      column-gap: 8px;
      padding: 12px;
      padding-bottom: calc(var(--footer-height) + 10px);
      max-width: 1700px;
      margin: 0 auto;
      height: calc(100vh - 120px);
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
      position: relative;
      z-index: 1;
    }

    .container::-webkit-scrollbar {
      display: none;
    }

    .card {
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.82), rgba(17, 24, 39, 0.74));
      border-radius: 18px;
      padding: 14px;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.18);
      box-shadow:
        0 18px 40px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      position: relative;
      isolation: isolate;
      transform: translateY(12px) scale(0.985);
      opacity: 0;
      animation: cardEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.4), rgba(250, 204, 21, 0.16), rgba(34, 197, 94, 0.18));
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.55;
      pointer-events: none;
      z-index: -1;
    }

    .card::after {
      content: '';
      position: absolute;
      inset: auto 16px 10px 16px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(56, 189, 248, 0.55), transparent);
      opacity: 0.45;
      pointer-events: none;
    }

    .container > .card:nth-of-type(1) { animation-delay: 0.05s; }
    .container > .card:nth-of-type(2) { animation-delay: 0.14s; }
    .container > .card:nth-of-type(3) { animation-delay: 0.23s; }
    .container > .card:nth-of-type(4) { animation-delay: 0.32s; }
    .container > .card:nth-of-type(5) { animation-delay: 0.41s; }

    .card:hover {
      transform: translateY(-4px) scale(1.005);
      border-color: rgba(56, 189, 248, 0.35);
      box-shadow:
        0 24px 55px rgba(0, 0, 0, 0.35),
        0 0 0 1px rgba(56, 189, 248, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .card h2 {
      margin-bottom: 10px;
      color: #f8fafc;
      border-bottom: 1px solid rgba(148, 163, 184, 0.18);
      padding-bottom: 8px;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      position: relative;
    }

    .card h2::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -1px;
      width: 74px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, #38bdf8, rgba(56, 189, 248, 0.08));
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: auto;
      word-wrap: break-word;
      overflow: hidden;
      border-radius: 12px;
    }

    th, td {
      padding: 8px 6px;
      text-align: left;
      border-bottom: 1px solid rgba(148, 163, 184, 0.15);
      font-size: 13px;
      word-break: break-word;
    }

    th {
      background: rgba(15, 23, 42, 0.85);
      color: #93c5fd;
      position: sticky;
      top: 0;
      z-index: 2;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 12px;
    }

    ul {
      list-style: none;
    }

    ul li {
      padding: 9px 10px;
      margin-bottom: 6px;
      background: linear-gradient(90deg, rgba(15, 23, 42, 0.88), rgba(15, 23, 42, 0.55));
      border-left: 4px solid #38bdf8;
      font-size: 13px;
      border-radius: 10px;
      line-height: 1.3;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .role-group-values {
      list-style: disc;
      margin: 6px 0 0 18px;
      padding: 0;
    }

    .role-group-values li {
      background: transparent;
      border-left: none;
      box-shadow: none;
      border-radius: 0;
      margin-bottom: 2px;
      padding: 0;
      line-height: 1.35;
      color: #e2e8f0;
      font-size: 12px;
    }

    .highlight {
      color: #facc15;
      font-weight: bold;
    }

    .footer-marquee {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: linear-gradient(90deg, #dc2626, #ef4444, #b91c1c);
      color: white;
      height: var(--footer-height);
      display: flex;
      align-items: center;
      overflow: hidden;
      white-space: nowrap;
      border-top: 1px solid rgba(255, 255, 255, 0.24);
      box-shadow: 0 -10px 25px rgba(0, 0, 0, 0.2);
    }

    .marquee-content {
      display: inline-block;
      white-space: nowrap;
      word-break: keep-all;
      overflow-wrap: normal;
      flex-wrap: nowrap;
      min-width: max-content;
      padding-left: 100%;
      animation: marquee 22s linear infinite;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.25);
    }

    @keyframes marquee {
      0% {
        transform: translateX(0%);
      }

      100% {
        transform: translateX(-100%);
      }
    }

    @keyframes cardEnter {
      0% {
        opacity: 0;
        transform: translateY(18px) scale(0.97);
        filter: blur(4px);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    .scrollable {
      height: auto;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      max-height: 100%;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .scrollable {
      scrollbar-color: rgba(56, 189, 248, 0.45) rgba(255, 255, 255, 0.04);
    }

    .scrollable::-webkit-scrollbar {
      display: none;
    }

    .scroll-content {
      width: 100%;
      display: block;
    }

    /* Auto-scroll marquee for Past FIRs */
    .auto-scroll {
      overflow: hidden !important;
      position: relative;
    }

    .auto-scroll .scroll-content {
      animation: autoScrollVertical 20s linear infinite;
    }

    .auto-scroll .scroll-content:hover {
      animation-play-state: paused;
    }

    @keyframes autoScrollVertical {
      0% {
        transform: translateY(0);
      }
      100% {
        transform: translateY(-50%);
      }
    }

    .status-green {
      color: #4ade80;
      font-weight: bold;
    }

    .status-red {
      color: #f87171;
      font-weight: bold;
    }

    .status-yellow {
      color: #facc15;
      font-weight: bold;
    }

    /* Hearings animation */
    .hearing-content {
      opacity: 1;
      transition: opacity 0.22s ease-in-out;
    }

    .hearing-marquee {
      overflow: hidden;
      position: relative;
      min-height: 0;
    }

    .achievements-marquee {
      overflow: hidden;
      position: relative;
      min-height: 0;
    }

    .challan-marquee {
      overflow: hidden;
      position: relative;
      min-height: 0;
    }

    .challanMarqueeTrack {
      display: block;
      min-height: 0;
      animation: challanVerticalMarquee var(--challan-marquee-duration, 18s) linear infinite;
      will-change: transform;
    }

    .challanMarqueeTrack:hover {
      animation-play-state: paused;
    }

    .challan-table-head {
      margin-bottom: 8px;
    }

    .challan-table-head th {
      position: static;
    }

    .challan-marquee table {
      margin: 0;
    }

    @keyframes challanVerticalMarquee {
      0% {
        transform: translateY(0);
      }

      100% {
        transform: translateY(-50%);
      }
    }

    .achievementsMarqueeTrack {
      display: block;
      min-height: 0;
      animation: achievementsVerticalMarquee var(--achievements-marquee-duration, 18s) linear infinite;
      will-change: transform;
    }

    .achievementsMarqueeTrack:hover {
      animation-play-state: paused;
    }

    .achievementsMarqueeTrack ul {
      margin: 0;
      padding: 0;
    }

    @keyframes achievementsVerticalMarquee {
      0% {
        transform: translateY(0);
      }

      100% {
        transform: translateY(-50%);
      }
    }

    .hearingMarqueeLoop {
      display: block;
      gap: 0;
      min-height: 0;
      overflow: hidden;
      animation: hearingListAutoScroll var(--hearing-marquee-duration, 12s) linear infinite;
      will-change: transform;
    }

    .hearingMarqueeLoop:hover {
      animation-play-state: paused;
    }

    .hearingMarqueeLoop ul {
      display: block;
      margin: 0;
      padding: 0;
      width: 100%;
    }

    .hearingMarqueeLoop li {
      margin-bottom: 6px;
    }

    @keyframes hearingListAutoScroll {
      0% {
        transform: translateY(0);
      }

      100% {
        transform: translateY(-50%);
      }
    }

    .todayHearingMarqueeTrack {
      display: block;
      min-height: 0;
      animation: todayHearingListAutoScroll var(--today-hearing-marquee-duration, 12s) linear infinite;
      will-change: transform;
    }

    .todayHearingMarqueeTrack:hover {
      animation-play-state: paused;
    }

    .todayHearingMarqueeTrack ul {
      margin: 0;
      padding: 0;
    }

    @keyframes todayHearingListAutoScroll {
      0% {
        transform: translateY(0);
      }

      100% {
        transform: translateY(-50%);
      }
    }

    @keyframes fadeIn {
      0% {
        opacity: 0;
        transform: translateY(10px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hearing-indicator {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: bold;
      margin-left: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    .hearing-indicator.yesterday {
      background: rgba(156, 163, 175, 0.2);
      color: #9ca3af;
    }

    .hearing-indicator.today {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }

    .hearing-indicator.tomorrow {
      background: rgba(250, 204, 21, 0.2);
      color: #facc15;
    }

    /* Carousel progress bars */
    .carousel-indicators {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 12px 0 6px 0;
      margin-top: auto;
    }

    .carousel-bar {
      flex: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
      cursor: pointer;
      transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .carousel-bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      transition: width 0.3s ease, background 0.3s ease;
    }

    .carousel-bar.yesterday-bar .carousel-bar-fill {
      background: linear-gradient(90deg, rgba(156, 163, 175, 0.3), #9ca3af);
    }

    .carousel-bar.today-bar .carousel-bar-fill {
      background: linear-gradient(90deg, rgba(34, 197, 94, 0.3), #22c55e);
    }

    .carousel-bar.tomorrow-bar .carousel-bar-fill {
      background: linear-gradient(90deg, rgba(250, 204, 21, 0.3), #facc15);
    }

    .carousel-bar.active .carousel-bar-fill {
      width: 100%;
      box-shadow: 0 0 14px rgba(255, 255, 255, 0.2);
    }

    .carousel-bar:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: scaleY(1.35) translateZ(0);
    }

    .carousel-bar.yesterday-bar:hover {
      background: rgba(156, 163, 175, 0.2);
    }

    .carousel-bar.today-bar:hover {
      background: rgba(34, 197, 94, 0.2);
    }

    .carousel-bar.tomorrow-bar:hover {
      background: rgba(250, 204, 21, 0.2);
    }

    .progress-bar-container {
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 6px;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #38bdf8, #22c55e);
      border-radius: 2px;
      transition: width 0.1s linear;
      width: 0%;
    }

    .carousel-label {
      display: flex;
      justify-content: space-between;
      padding: 0 2px;
      margin-top: 6px;
    }

    .carousel-label span {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.62);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .carousel-label .next-up {
      color: #38bdf8;
      font-weight: bold;
    }

    .section-hearings-carousel,
    .section-hearings-today {
      min-height: 0;
    }

    .section-hearings-carousel .scrollable,
    .section-hearings-today .scrollable {
      min-height: 0;
    }

    .section-hearings-carousel .scrollable,
    .section-hearings-today .scrollable,
    .section-this-month-firs .scrollable,
    .section-achievements .scrollable {
      flex: 1;
      min-height: 0;
    }

    .section-this-month-firs h2,
    .section-achievements h2,
    .section-hearings-today h2,
    .section-hearings-carousel h2,
    .section-our-officers h2,
    .section-duty-officer h2 {
      position: sticky;
      top: 0;
      backdrop-filter: blur(8px);
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.95), rgba(15, 23, 42, 0.72));
      z-index: 2;
    }

    .section-this-month-firs {
      box-shadow:
        0 18px 40px rgba(0, 0, 0, 0.26),
        0 0 40px rgba(56, 189, 248, 0.08);
    }

    .section-achievements {
      box-shadow:
        0 18px 40px rgba(0, 0, 0, 0.26),
        0 0 40px rgba(236, 72, 153, 0.08);
    }

    .section-our-officers {
      box-shadow:
        0 18px 40px rgba(0, 0, 0, 0.26),
        0 0 40px rgba(34, 197, 94, 0.08);
    }

    .section-duty-officer {
      box-shadow:
        0 18px 40px rgba(0, 0, 0, 0.26),
        0 0 40px rgba(250, 204, 21, 0.08);
    }

    .section-duty-officer #duty-officer-list {
      column-count: 2;
      column-gap: 10px;
    }

    .section-duty-officer #duty-officer-list li {
      break-inside: avoid;
      page-break-inside: avoid;
      width: 100%;
    }

    .section-hearings-today {
      box-shadow:
        0 18px 40px rgba(0, 0, 0, 0.26),
        0 0 40px rgba(168, 85, 247, 0.08);
    }

    .section-hearings-carousel {
      box-shadow:
        0 18px 40px rgba(0, 0, 0, 0.26),
        0 0 40px rgba(245, 158, 11, 0.08);
    }

    /* ===================== RESPONSIVE DESIGN ===================== */

    /* Tablet and smaller desktop (1024px and below) */
    @media (max-width: 1024px) {
      .header h1 {
        font-size: 22px;
      }

      .datetime {
        font-size: 16px;
      }

      .logo {
        width: 45px;
        height: 45px;
      }

      .container {
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
          "officers duty"
          "thismonth achievements"
          "hearings-today hearings-today"
          "hearings-carousel hearings-carousel";
        height: calc(100vh - 120px);
        overflow-y: auto;
      }

      .card h2 {
        font-size: 18px;
      }

      th, td {
        font-size: 12px;
        padding: 5px;
      }

      ul li {
        font-size: 12px;
        padding: 6px;
      }

      .scrollable {
        max-height: 180px !important;
      }

      .marquee-content {
        font-size: 22px;
      }
    }

    /* Mobile devices (768px and below) */
    @media (max-width: 768px) {
      body {
        overflow: hidden;
        height: 100vh;
      }

      .header {
        height: auto;
        min-height: 60px;
        padding: 10px 15px;
        flex-wrap: wrap;
      }

      .header h1 {
        font-size: 18px;
        width: 100%;
        text-align: center;
        margin-bottom: 8px;
      }

      .header-right {
        width: 100%;
        justify-content: center;
        gap: 12px;
      }

      .datetime {
        font-size: 12px;
      }

      .logo {
        width: 35px;
        height: 35px;
      }

      .container {
        grid-template-columns: 1fr;
        grid-template-areas:
          "officers"
          "duty"
          "thismonth"
          "achievements"
          "hearings-today"
          "hearings-carousel";
        height: calc(100vh - 120px);
        padding: 8px;
        row-gap: 10px;
        overflow-y: auto;
      }

      .card {
        padding: 10px;
        min-height: auto !important;
      }

      .card h2 {
        font-size: 16px;
        margin-bottom: 6px;
      }

      th, td {
        font-size: 11px;
        padding: 4px;
      }

      ul li {
        font-size: 11px;
        padding: 5px;
        margin-bottom: 4px;
      }

      .scrollable {
        max-height: 180px !important;
      }

      .section-duty-officer #duty-officer-list {
        column-count: 1;
      }

      .carousel-indicators {
        padding: 10px 0 4px 0;
        gap: 6px;
      }

      .carousel-bar {
        height: 5px;
      }

      .carousel-label span {
        font-size: 8px;
      }

      .footer-marquee {
        height: 40px;
      }

      :root {
        --footer-height: 40px;
      }

      .marquee-content {
        font-size: 16px;
      }
    }

    /* Small mobile devices (480px and below) */
    @media (max-width: 480px) {
      .header h1 {
        font-size: 14px;
      }

      .datetime {
        font-size: 10px;
      }

      .logo {
        width: 30px;
        height: 30px;
      }

      .container {
        padding: 6px;
        row-gap: 8px;
      }

      .card {
        padding: 8px;
        border-radius: 8px;
      }

      .card h2 {
        font-size: 14px;
        padding-bottom: 4px;
      }

      th, td {
        font-size: 10px;
        padding: 3px;
      }

      ul li {
        font-size: 10px;
        padding: 4px;
        border-left-width: 3px;
      }

      .scrollable {
        max-height: 180px !important;
      }

      .carousel-indicators {
        padding: 8px 0 3px 0;
        gap: 5px;
      }

      .carousel-bar {
        height: 4px;
      }

      .carousel-label span {
        font-size: 7px;
      }

      .footer-marquee {
        height: 35px;
      }

      :root {
        --footer-height: 35px;
      }

      .marquee-content {
        font-size: 14px;
      }
    }

    /* Zoom level adjustments */
    @media (min-resolution: 120dpi) and (max-resolution: 150dpi) {
      .container {
        height: calc(100vh - 120px);
        overflow-y: auto;
      }

      .card {
        overflow: visible;
      }
    }

    @media (min-resolution: 150dpi) {
      body {
        overflow: hidden;
        height: 100vh;
      }

      .container {
        height: calc(100vh - 120px);
        overflow-y: auto;
      }

      .card {
        overflow: visible;
      }

      .scrollable {
        max-height: 180px !important;
      }
    }

    /* Ensure content is visible on very large screens */
    @media (min-width: 1920px) {
      .header h1 {
        font-size: 36px;
      }

      .datetime {
        font-size: 26px;
      }

      .logo {
        width: 65px;
        height: 65px;
      }

      .card h2 {
        font-size: 24px;
      }

      th, td {
        font-size: 16px;
        padding: 8px;
      }

      ul li {
        font-size: 16px;
        padding: 9px;
      }

      .marquee-content {
        font-size: 32px;
      }

      .footer-marquee {
        height: 60px;
      }

      :root {
        --footer-height: 60px;
      }
    }

    /* Landscape orientation on mobile devices */
    @media (max-height: 600px) and (orientation: landscape) {
      .header {
        min-height: 50px;
        padding: 5px 15px;
      }

      .header h1 {
        font-size: 16px;
      }

      .datetime {
        font-size: 12px;
      }

      .logo {
        width: 35px;
        height: 35px;
      }

      .container {
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        grid-template-areas: none;
        padding: 8px;
        height: calc(100vh - 85px);
        overflow-y: auto;
      }

      .card {
        grid-area: auto !important;
        height: auto !important;
        max-height: 180px;
      }

      .scrollable {
        max-height: 180px !important;
      }

      .footer-marquee {
        height: 35px;
      }

      :root {
        --footer-height: 35px;
      }

      .marquee-content {
        font-size: 14px;
      }
    }

    /* Print styles */
    @media print {
      .footer-marquee {
        display: none;
      }

      body {
        overflow: visible;
        height: auto;
      }

      .container {
        height: auto;
        overflow: visible;
        grid-template-columns: 1fr 1fr;
      }

      .card {
        break-inside: avoid;
        page-break-inside: avoid;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1 id="dashboard-title"></h1>

    <div class="header-right">
      <div class="datetime" id="datetime"></div>
      <img id="header-logo" class="logo" src="" alt="Logo">
    </div>
  </div>

  <div class="logo-overlay" id="logo-overlay" aria-hidden="true">
    <img id="center-logo" src="" alt="" />
  </div>

  <div class="container">

    <!-- DEADLINE FOR CHALLAN PRESENT -->
    <div class="card section-this-month-firs" style="grid-area: thismonth; height: 40vh;">
      <h2>Deadline for Challan Present</h2>

      <div class="challan-table-head" aria-hidden="true">
        <table>
          <thead>
            <tr>
              <th>FIR No.</th>
              <th>Sections</th>
              <th>Last Date</th>
            </tr>
          </thead>
        </table>
      </div>

      <div class="scrollable challan-marquee" id="challan-marquee-wrapper" style="max-height: 100%;">
        <div class="scroll-content challanMarqueeTrack">
          <table>
            <tbody id="this-month-fir-table-body"></tbody>
          </table>
          <table>
            <tbody id="this-month-fir-table-body-duplicate"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ACHIEVEMENTS -->
    <div class="card section-achievements" style="grid-area: achievements; max-height: 76vh;">
      <h2>Achievements</h2>
      <div class="scrollable achievements-marquee" id="achievements-marquee-wrapper">
        <div class="scroll-content achievementsMarqueeTrack">
          <ul id="achievements-list"></ul>
          <ul id="achievements-list-duplicate"></ul>
        </div>
      </div>
    </div>

    <!-- OUR OFFICERS -->
    <div class="card section-our-officers" style="grid-area: officers;">
      <h2>Our Officers</h2>
      <ul id="officers-list"></ul>
    </div>

    <!-- DUTY OFFICER -->
    <div class="card section-duty-officer" style="grid-area: duty;">
      <h2>Duty Officer</h2>
      <ul id="duty-officer-list"></ul>
    </div>

    <!-- TODAY HEARINGS (Static) -->
    <div class="card section-hearings-today" style="grid-area: hearings-today;">
      <h2>
        <span>Today Hearings</span>
        <span class="hearing-indicator today">Today</span>
      </h2>

      <div class="scrollable hearing-marquee" id="today-hearing-marquee-wrapper">
        <div class="scroll-content todayHearingMarqueeTrack">
          <ul id="today-hearing-list"></ul>
          <ul id="today-hearing-list-duplicate"></ul>
        </div>
      </div>
    </div>

    <!-- YESTERDAY/TOMORROW HEARINGS (Rotating) -->
    <div class="card section-hearings-carousel" style="grid-area: hearings-carousel;">
      <h2>
        <span id="hearing-title">Yesterday Hearings</span>
        <span class="hearing-indicator yesterday" id="hearing-indicator">Yesterday</span>
      </h2>

      <div class="scrollable hearing-marquee">
        <div class="scroll-content hearing-content hearingMarqueeLoop" id="hearing-content">
          <ul id="hearing-list"></ul>
          <ul id="hearing-list-duplicate"></ul>
        </div>
      </div>

      <!-- Carousel Progress Bars -->
      

      <!-- Progress Bar -->
      <div class="progress-bar-container">
        <div class="progress-bar" id="hearing-progress"></div>
      </div>

      <!-- Next Up Label -->
      <div class="carousel-label">
        <span>Current: <span id="current-label">Yesterday</span></span>
        <span class="next-up">Next: <span id="next-label">Tomorrow</span></span>
      </div>
    </div>

  </div>

  <!-- FOOTER MARQUEE -->
  <div class="footer-marquee section-footer-marquee">
    <div class="marquee-content" id="marquee-text"></div>
  </div>

  <script src="ant-data.js"></script>
  <script>
    let dashboardData = null;
    let hearings = [];
    let currentHearingIndex = 0;
    let progressInterval;
    let autoRotateTimeout;
    let hearingRunDuration = 20000;
    const hearingDisplayDuration = 20000;
    let hearingStartTime = Date.now();

    function updateDateTime() {
      const now = new Date();
      const options = {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      };

      document.getElementById('datetime').innerHTML = now.toLocaleDateString('en-IN', options);
    }

    function showCenterLogo() {
      const logoOverlay = document.getElementById('logo-overlay');
      logoOverlay.classList.add('visible');
      setTimeout(() => {
        logoOverlay.classList.remove('visible');
      }, dashboardData.logoVisibleMs);
    }

    function renderList(targetId, items) {
      const target = document.getElementById(targetId);
      target.innerHTML = '';
      items.forEach(item => {
        target.innerHTML += `<li>${item}</li>`;
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatLabel(label, fallbackLabel) {
      const raw = String(label || fallbackLabel || 'Item')
        .replace(/[_-]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();

      return raw.replace(/\b\w/g, char => char.toUpperCase());
    }

    function normalizeRoleEntries(source) {
      if (!source) {
        return [];
      }

      if (Array.isArray(source)) {
        return source.map((item, index) => {
          if (typeof item === 'string') {
            return { label: `Role ${index + 1}`, value: item };
          }

          return {
            label: item.label || item.role || item.title || `Role ${index + 1}`,
            value: item.value || item.name || item.person || ''
          };
        });
      }

      if (typeof source === 'object') {
        return Object.entries(source).map(([label, value]) => ({ label, value }));
      }

      return [];
    }

    function renderRoleList(targetId, source, fallbackLabel) {
      const grouped = new Map();

      normalizeRoleEntries(source)
        .filter(item => item.value !== null && item.value !== undefined && String(item.value).trim() !== '')
        .forEach(item => {
          const displayLabel = formatLabel(item.label, fallbackLabel);
          const key = displayLabel.toLowerCase();

          if (!grouped.has(key)) {
            grouped.set(key, {
              label: displayLabel,
              values: []
            });
          }

          grouped.get(key).values.push(String(item.value).trim());
        });

      const groupedItems = Array.from(grouped.values()).map(group => {
        const valuesMarkup = group.values
          .map(value => `<li>${escapeHtml(value)}</li>`)
          .join('');
        return `
          <span class="highlight">${escapeHtml(group.label)}:</span>
          <ul class="role-group-values">${valuesMarkup}</ul>
        `.trim();
      });

      renderList(targetId, groupedItems);
    }

    function renderHearingItems(hearing) {
      const hearingList = document.getElementById('hearing-list');
      const hearingListDuplicate = document.getElementById('hearing-list-duplicate');

      hearingList.innerHTML = '';
      hearingListDuplicate.innerHTML = '';

      hearing.data.forEach(item => {
        hearingList.innerHTML += `<li>${item}</li>`;
        hearingListDuplicate.innerHTML += `<li>${item}</li>`;
      });

      return hearingList.scrollHeight;
    }

    function renderChallanItems(items) {
      const firTable = document.getElementById('this-month-fir-table-body');
      const firTableDuplicate = document.getElementById('this-month-fir-table-body-duplicate');
      firTable.innerHTML = '';
      firTableDuplicate.innerHTML = '';

      items.forEach(fir => {
        const row = `
          <tr>
            <td>${fir.number}</td>
            <td>${fir.sections}</td>
            <td class="highlight">${fir.deadline}</td>
          </tr>
        `;
        firTable.innerHTML += row;
        firTableDuplicate.innerHTML += row;
      });

      return firTable.scrollHeight;
    }

    function renderTodayHearingItems(items) {
      const todayHearingList = document.getElementById('today-hearing-list');
      const todayHearingListDuplicate = document.getElementById('today-hearing-list-duplicate');

      todayHearingList.innerHTML = '';
      todayHearingListDuplicate.innerHTML = '';

      items.forEach(item => {
        todayHearingList.innerHTML += `<li>${item}</li>`;
        todayHearingListDuplicate.innerHTML += `<li>${item}</li>`;
      });

      return todayHearingList.scrollHeight;
    }

    function renderAchievementItems(items) {
      const achievementsList = document.getElementById('achievements-list');
      const achievementsListDuplicate = document.getElementById('achievements-list-duplicate');

      achievementsList.innerHTML = '';
      achievementsListDuplicate.innerHTML = '';

      items.forEach(item => {
        const safeItem = escapeHtml(item);
        achievementsList.innerHTML += `<li>${safeItem}</li>`;
        achievementsListDuplicate.innerHTML += `<li>${safeItem}</li>`;
      });

      return achievementsList.scrollHeight;
    }

    function updateHearings() {
      const hearing = hearings[currentHearingIndex];
      const hearingTitle = document.getElementById('hearing-title');
      const hearingIndicator = document.getElementById('hearing-indicator');
      const hearingContent = document.getElementById('hearing-content');
      const marqueeWrapper = hearingContent.parentElement;

      hearingContent.style.opacity = '0';
      requestAnimationFrame(() => {
        hearingContent.style.opacity = '1';
      });

      hearingTitle.textContent = hearing.title;
      hearingIndicator.textContent = hearing.type.toUpperCase();
      hearingIndicator.className = `hearing-indicator ${hearing.class}`;

      const listHeight = renderHearingItems(hearing);
      const hearingMarqueeDuration = Math.max(listHeight * 6, 9000);
      hearingRunDuration = hearingDisplayDuration;
      marqueeWrapper.style.setProperty('--hearing-marquee-duration', `${hearingMarqueeDuration / 1000}s`);

      document.querySelectorAll('.carousel-bar').forEach((bar, index) => {
        bar.classList.toggle('active', index === currentHearingIndex);
      });

      const nextIndex = (currentHearingIndex + 1) % hearings.length;
      document.getElementById('current-label').textContent = hearing.type.charAt(0).toUpperCase() + hearing.type.slice(1);
      document.getElementById('next-label').textContent = hearings[nextIndex].type.charAt(0).toUpperCase() + hearings[nextIndex].type.slice(1);

      const progressBar = document.getElementById('hearing-progress');
      progressBar.style.width = '0%';

      if (progressInterval) clearInterval(progressInterval);
      if (autoRotateTimeout) clearTimeout(autoRotateTimeout);

      hearingStartTime = Date.now();
      progressInterval = setInterval(() => {
        const progress = Math.min(((Date.now() - hearingStartTime) / hearingRunDuration) * 100, 100);
        progressBar.style.width = progress + '%';

        if (progress >= 100) {
          clearInterval(progressInterval);
        }
      }, 50);

      autoRotateTimeout = setTimeout(() => {
        currentHearingIndex = (currentHearingIndex + 1) % hearings.length;
        updateHearings();
      }, hearingRunDuration);
    }

    function renderDashboard(data) {
      dashboardData = data;

      document.getElementById('dashboard-title').innerText = dashboardData.dashboardTitle;
      document.getElementById('header-logo').src = dashboardData.logoUrl;
      document.getElementById('center-logo').src = dashboardData.logoUrl;

      renderRoleList('officers-list', dashboardData.officers, 'Officer');
      renderRoleList('duty-officer-list', dashboardData.dutyOfficers || dashboardData.dutyOfficer, 'Duty');

      const challanHeight = renderChallanItems(dashboardData.thisMonthFirs || []);
      const challanWrapper = document.getElementById('challan-marquee-wrapper');
      const challanDurationMs = Math.max(challanHeight * 12, 10000);
      challanWrapper.style.setProperty('--challan-marquee-duration', `${challanDurationMs / 1000}s`);

      const achievements = dashboardData.achievements || [];
      const achievementsHeight = renderAchievementItems(achievements);
      const achievementsWrapper = document.getElementById('achievements-marquee-wrapper');
      const achievementsDurationMs = Math.max(achievementsHeight * 12, 10000);
      achievementsWrapper.style.setProperty('--achievements-marquee-duration', `${achievementsDurationMs / 1000}s`);

      const todayHearings = dashboardData.todayHearings || [];
      const todayHearingsHeight = renderTodayHearingItems(todayHearings);
      const todayHearingsWrapper = document.getElementById('today-hearing-marquee-wrapper');
      const todayHearingsDurationMs = Math.max(todayHearingsHeight * 10, 9000);
      todayHearingsWrapper.style.setProperty('--today-hearing-marquee-duration', `${todayHearingsDurationMs / 1000}s`);

      hearings = [
        { type: 'yesterday', title: 'Yesterday Hearings', data: dashboardData.yesterdayHearings, class: 'yesterday' },
        { type: 'tomorrow', title: 'Tomorrow Hearings', data: dashboardData.tomorrowHearings, class: 'tomorrow' }
      ];

      currentHearingIndex = 0;
      updateHearings();

      document.getElementById('marquee-text').textContent = dashboardData.marqueeText;

      setTimeout(showCenterLogo, dashboardData.logoShowAfterMs);
      setInterval(showCenterLogo, dashboardData.logoRepeatEveryMs);

      setTimeout(() => {
        location.reload();
      }, dashboardData.autoReloadMs);
    }

    updateDateTime();
    setInterval(updateDateTime, 1000);

    if (window.ANT_DASHBOARD_DATA) {
      renderDashboard(window.ANT_DASHBOARD_DATA);
    } else {
      console.error('ANT_DASHBOARD_DATA not found. Ensure ant-data.js is present and loaded before ant.html script.');
      document.getElementById('dashboard-title').innerText = 'Dashboard data failed to load - check ant-data.js';
    }
  </script>

</body>
</html>

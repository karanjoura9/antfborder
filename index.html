<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ANTF Information Portal</title>
    <style>
        :root {
            --header-bg: #0d3b8e;
            --nav-bg: #b3202a;
            --sidebar-bg: #eef4ff;
            --panel-bg: #f7f9fe;
            --accent: #c62834;
            --accent-soft: #e8efff;
            --line: #c8d8f2;
            --text-dark: #1a2740;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #d7e5ff 0%, #eef3ff 52%, #f8e8ea 100%);
            color: var(--text-dark);
            min-height: 100vh;
            overflow: hidden;
        }

        .portal-shell {
            display: grid;
            grid-template-rows: auto auto 1fr auto;
            min-height: 100vh;
        }

        .portal-header {
            background: linear-gradient(90deg, #0d3b8e 0%, #1557b0 58%, #c62834 100%);
            color: var(--white);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .portal-brand {
            display: flex;
            align-items: center;
            gap: 18px;
            min-width: 0;
            flex: 1;
            max-width: 550px;
        }

        .portal-logo {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.14), 0 0 0 6px rgba(198, 40, 52, 0.2);
        }

        .portal-title-wrap h1 {
            font-size: clamp(1.3rem, 2.5vw, 2rem);
            font-weight: 700;
            letter-spacing: 0.4px;
            line-height: 1.15;
        }

        .portal-title-wrap p {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            opacity: 0.9;
            margin-top: 4px;
        }

        .portal-title-wrap {
            text-align: center;
            flex: 1;
        }

        .portal-header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .portal-badge {
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 999px;
            padding: 9px 14px;
            font-weight: 600;
            font-size: 0.88rem;
            white-space: nowrap;
            background: rgba(255, 255, 255, 0.12);
        }

        .portal-header-logo-right {
            width: 58px;
            height: 58px;
            object-fit: contain;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.95);
            padding: 4px;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.14), 0 0 0 6px rgba(13, 59, 142, 0.18);
        }

        .top-nav {
            background: linear-gradient(90deg, #ab1f2a 0%, #c62834 100%);
            padding: 8px 12px;
            overflow-x: auto;
            border-bottom: 2px solid rgba(255, 255, 255, 0.28);
        }

        .top-nav ul {
            list-style: none;
            display: flex;
            gap: 8px;
            min-width: max-content;
        }

        .top-nav a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--white);
            background: rgba(13, 59, 142, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background 0.2s ease;
        }

        .top-nav a:hover,
        .top-nav a:focus-visible {
            background: rgba(13, 59, 142, 0.28);
            outline: none;
        }

        .breadcrumb-bar {
            background: linear-gradient(90deg, #edf3ff 0%, #fff1f2 100%);
            border-bottom: 1px solid var(--line);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .breadcrumb-updates {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            border: 1px solid #d3b3b9;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.72);
            padding: 6px 0;
            width: 60vw;
        }

        .breadcrumb-updates-track {
            display: inline-block;
            padding-left: 100%;
            white-space: nowrap;
            color: #9e1f2a;
            font-size: 0.85rem;
            font-weight: 600;
            animation: breadcrumbTickerMove 24s linear infinite;
        }

        @keyframes breadcrumbTickerMove {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-100%);
            }
        }

        .sidebar-toggle {
            border: 1px solid #c89ca2;
            background: #fff7f8;
            color: #9f1f2a;
            border-radius: 999px;
            width: 42px;
            height: 34px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-toggle:hover,
        .sidebar-toggle:focus-visible {
            background: #ffe8eb;
            outline: none;
        }

        .hamburger,
        .hamburger::before,
        .hamburger::after {
            display: block;
            width: 16px;
            height: 2px;
            border-radius: 999px;
            background: #9f1f2a;
            position: relative;
        }

        .hamburger::before,
        .hamburger::after {
            content: "";
            position: absolute;
            left: 0;
        }

        .hamburger::before {
            top: -5px;
        }

        .hamburger::after {
            top: 5px;
        }

        .breadcrumb-path {
            font-size: 0.92rem;
            color: #0d3b8e;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 0;
        }

        .content-wrap {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 10px;
            padding: 10px;
            min-height: 0;
            overflow: hidden;
            max-height: none;
        }

        .sidebar {
            background: var(--sidebar-bg);
            color: #17345f;
            border-radius: 12px;
            padding: 8px;
            overflow-y: auto;
            border: 1px solid var(--line);
            height: 100%;
            min-height: 0;
        }

        .menu-group {
            margin-bottom: 4px;
            border-bottom: 1px solid #dbe4f6;
            border-radius: 0;
            overflow: visible;
            background: transparent;
        }

        .menu-group summary,
        .menu-link {
            cursor: pointer;
            display: block;
            color: #163d7a;
            text-decoration: none;
            padding: 10px 10px;
            font-size: 0.95rem;
            font-weight: 600;
            border-bottom: none;
            border-radius: 6px;
        }

        .menu-group summary {
            list-style: none;
        }

        .menu-group summary::-webkit-details-marker {
            display: none;
        }

        .menu-group summary::after {
            content: "▸";
            float: right;
            transition: transform 0.28s ease;
        }

        .menu-group[open] summary::after {
            transform: rotate(90deg);
        }

        .submenu {
            list-style: none;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transform: translateY(-4px);
            padding: 0;
            transition: max-height 0.28s ease, opacity 0.22s ease, transform 0.24s ease;
        }

        .menu-group[open] .submenu {
            max-height: 280px;
            opacity: 1;
            transform: translateY(0);
            padding: 0 0 6px 0;
        }

        .submenu a {
            display: block;
            text-decoration: none;
            color: #8e1d28;
            font-size: 0.88rem;
            padding: 8px 10px 8px 22px;
            border-top: none;
            border-radius: 6px;
            transform: translateY(-2px);
            opacity: 0;
            transition: transform 0.22s ease, opacity 0.22s ease;
        }

        .menu-group[open] .submenu a {
            transform: translateY(0);
            opacity: 1;
        }

        .menu-link:hover,
        .menu-link:focus-visible,
        .menu-group summary:hover,
        .menu-group summary:focus-visible,
        .submenu a:hover,
        .submenu a:focus-visible {
            background: linear-gradient(90deg, #e4edff 0%, #ffe6e9 100%);
            outline: none;
        }

        .content-panel {
            border-radius: 16px;
            overflow: auto;
            background: var(--panel-bg);
            border: 1px solid var(--line);
            box-shadow: 0 8px 18px rgba(18, 49, 104, 0.1);
            min-height: 0;
            height: 100%;
        }

        .content-frame {
            width: 100%;
            height: 100%;
            min-height: 0;
            border: 0;
            background: var(--panel-bg);
            overflow-y: auto;
            display: block;
        }

        body.sidebar-collapsed .content-wrap {
            grid-template-columns: 1fr;
        }

        body.sidebar-collapsed .sidebar {
            display: none;
        }

        .ticker {
            background: linear-gradient(90deg, #0d3b8e 0%, #c62834 100%);
            color: #f4fbff;
            border-top: 2px solid rgba(255, 255, 255, 0.25);
            overflow: hidden;
            white-space: nowrap;
            padding: 7px 0;
            font-size: 1rem;
            font-weight: 700;
        }

        .ticker-track {
            display: inline-block;
            padding-left: 100%;
            animation: tickerMove 26s linear infinite;
        }

        .global-pdf-modal {
            position: fixed;
            inset: 0;
            z-index: 3000;
            display: none;
            background: rgba(6, 18, 44, 0.72);
        }

        .global-pdf-modal.open {
            display: block;
        }

        .global-pdf-dialog {
            width: 100vw;
            height: 100vh;
            background: #fff;
            display: flex;
            flex-direction: column;
        }

        .global-pdf-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 12px;
            background: linear-gradient(90deg, #eef3ff 0%, #fff0f2 100%);
            border-bottom: 1px solid var(--line);
        }

        .global-pdf-title {
            font-size: 0.92rem;
            font-weight: 700;
            color: #0d3b8e;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .global-pdf-close {
            border: 1px solid #c7aab0;
            background: #fff;
            color: #9f1f2a;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
        }

        .global-pdf-close:hover,
        .global-pdf-close:focus-visible {
            background: #fff1f3;
            outline: none;
        }

        .global-pdf-frame {
            width: 100%;
            height: 100%;
            border: 0;
            background: #fff;
        }

        @keyframes tickerMove {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-100%);
            }
        }

        @media (max-width: 960px) {
            body {
                overflow: auto;
            }

            .portal-shell {
                min-height: auto;
            }

            .portal-brand {
                width: 100%;
            }

            .portal-title-wrap {
                text-align: left;
            }

            .content-wrap {
                grid-template-columns: 1fr;
                padding: 8px;
                gap: 8px;
            }

            .sidebar {
                max-height: 45vh;
            }

            .content-frame {
                min-height: 0;
            }

            .portal-header {
                flex-wrap: wrap;
            }

            .portal-header-right {
                width: 100%;
                justify-content: flex-end;
            }
        }

        @media (max-width: 680px) {
            .portal-header {
                padding: 10px 12px;
                gap: 10px;
            }

            .portal-brand {
                gap: 10px;
            }

            .portal-logo,
            .portal-header-logo-right {
                width: 44px;
                height: 44px;
            }

            .portal-title-wrap h1 {
                font-size: 1.05rem;
            }

            .portal-title-wrap p {
                font-size: 0.68rem;
                letter-spacing: 0.1em;
            }

            .portal-badge {
                padding: 6px 10px;
                font-size: 0.78rem;
            }

            .breadcrumb-bar {
                padding: 6px 8px;
                gap: 6px;
                flex-wrap: wrap;
            }

            .breadcrumb-updates {
                order: 3;
                width: 100%;
            }

            .breadcrumb-path {
                width: calc(100% - 52px);
                font-size: 0.84rem;
            }

            .top-nav a {
                padding: 7px 10px;
                font-size: 0.82rem;
            }

            .sidebar {
                max-height: 38vh;
            }

            .menu-group summary,
            .menu-link {
                font-size: 0.88rem;
                padding: 9px 8px;
            }

            .submenu a {
                font-size: 0.82rem;
                padding: 7px 8px 7px 18px;
            }

            .content-frame {
                min-height: 0;
            }

            .ticker {
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>
    <div class="portal-shell">
        <header class="portal-header">
            <div class="portal-brand">
                <img class="portal-logo" id="brandLeftLogo" src="logo.png" alt="ANTF logo" />
                <div class="portal-title-wrap">
                    <h1 id="brandTitle">Anti Narcotics Task Force</h1>
                    <p id="brandSubtitle">Punjab Police</p>
                </div>
                <img class="portal-header-logo-right" id="brandRightLogo" src="https://punjabpolice.gov.in/media/images/Logo_of_Punjab_Police_India.original.png" alt="Punjab Police logo" />
            </div>
            <div class="portal-header-right">
                <div class="portal-badge" id="todayDate">Date</div>
            </div>
        </header>

        <div class="breadcrumb-bar" aria-label="Breadcrumb and side menu control">
            <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-expanded="true" aria-controls="sideMenu" aria-label="Collapse side menu" title="Collapse side menu">
                <span class="hamburger" aria-hidden="true"></span>
            </button>
            <div class="breadcrumb-updates" aria-label="Quick updates">
                <div class="breadcrumb-updates-track" id="breadcrumbUpdatesTrack"></div>
            </div>
            <div class="breadcrumb-path" id="breadcrumbPath">Home</div>
        </div>

        <main class="content-wrap">
            <aside class="sidebar" id="sideMenu" aria-label="Main side menu"></aside>

            <section class="content-panel" aria-label="Content area">
                <iframe class="content-frame" name="contentFrame" src="pages/home.html" scrolling="yes"
                    title="Menu content area"></iframe>
            </section>
        </main>

        <div class="ticker" aria-label="Employee of the month strip">
            <div class="ticker-track" id="tickerTrack"></div>
        </div>
    </div>

    <div class="global-pdf-modal" id="globalPdfModal" role="dialog" aria-modal="true" aria-label="PDF Viewer">
        <div class="global-pdf-dialog">
            <div class="global-pdf-head">
                <div class="global-pdf-title" id="globalPdfTitle">PDF Viewer</div>
                <button class="global-pdf-close" id="globalPdfClose" type="button">Close</button>
            </div>
            <iframe class="global-pdf-frame" id="globalPdfFrame" title="PDF full screen preview"></iframe>
        </div>
    </div>

    <script src="data/index-config.js"></script>
    <script>
        (function applyIndexConfig() {
            var cfg = window.ANT_INDEX_CONFIG || {};
            var brand = cfg.brand || {};

            var titleEl = document.getElementById('brandTitle');
            var subtitleEl = document.getElementById('brandSubtitle');
            var leftLogoEl = document.getElementById('brandLeftLogo');
            var rightLogoEl = document.getElementById('brandRightLogo');
            var updatesEl = document.getElementById('breadcrumbUpdatesTrack');
            var tickerEl = document.getElementById('tickerTrack');
            var sideMenu = document.getElementById('sideMenu');

            if (brand.title) {
                titleEl.textContent = brand.title;
            }
            if (brand.subtitle) {
                subtitleEl.textContent = brand.subtitle;
            }
            if (brand.leftLogo) {
                leftLogoEl.setAttribute('src', brand.leftLogo);
            }
            if (brand.leftLogoAlt) {
                leftLogoEl.setAttribute('alt', brand.leftLogoAlt);
            }
            if (brand.rightLogo) {
                rightLogoEl.setAttribute('src', brand.rightLogo);
            }
            if (brand.rightLogoAlt) {
                rightLogoEl.setAttribute('alt', brand.rightLogoAlt);
            }

            function buildTrackText(prefix, parts) {
                if (!parts || !parts.length) {
                    return '';
                }
                var head = prefix ? (prefix + ': ') : '';
                var joined = head + parts.join(' | ') + ' |';
                return joined + ' ' + joined;
            }

            updatesEl.textContent = buildTrackText('QUICK UPDATES', cfg.quickUpdates || []);
            tickerEl.textContent = buildTrackText('', cfg.ticker || []);

            var menu = cfg.menu || [];
            var menuHtml = menu.map(function (item) {
                if (item.type === 'group') {
                    var submenu = (item.items || []).map(function (sub) {
                        return '<li><a href="' + sub.href + '" target="contentFrame" data-crumb="' + sub.crumb + '">' + sub.label + '</a></li>';
                    }).join('');

                    return '<details class="menu-group">' +
                        '<summary>' + item.label + '</summary>' +
                        '<ul class="submenu">' + submenu + '</ul>' +
                        '</details>';
                }

                return '<a class="menu-link" href="' + item.href + '" target="contentFrame" data-crumb="' + item.crumb + '">' + item.label + '</a>';
            }).join('');

            sideMenu.innerHTML = menuHtml;
        })();

        (function setCurrentDate() {
            var el = document.getElementById('todayDate');
            var now = new Date();
            el.textContent = now.toLocaleDateString('en-IN', {
                weekday: 'short',
                day: '2-digit',
                month: 'short',
                year: 'numeric'
            });
        })();

        (function setupBreadcrumbAndToggle() {
            var toggleBtn = document.getElementById('sidebarToggle');
            var pathEl = document.getElementById('breadcrumbPath');

            function setMenuState(isExpanded) {
                document.body.classList.toggle('sidebar-collapsed', !isExpanded);
                toggleBtn.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');
                var label = isExpanded ? 'Collapse side menu' : 'Expand side menu';
                toggleBtn.setAttribute('aria-label', label);
                toggleBtn.setAttribute('title', label);
            }

            toggleBtn.addEventListener('click', function () {
                var isCollapsed = document.body.classList.contains('sidebar-collapsed');
                setMenuState(isCollapsed);
            });

            function bindCrumbs() {
                var crumbLinks = document.querySelectorAll('a[target="contentFrame"]');
                for (var i = 0; i < crumbLinks.length; i += 1) {
                    crumbLinks[i].addEventListener('click', function () {
                        var crumb = this.getAttribute('data-crumb') || this.textContent.trim();
                        pathEl.textContent = crumb.toLowerCase() === 'home' ? 'Home' : 'Home / ' + crumb;
                    });
                }
            }

            bindCrumbs();

            setMenuState(true);
        })();

        (function setupGlobalPdfModal() {
            var modal = document.getElementById('globalPdfModal');
            var frame = document.getElementById('globalPdfFrame');
            var titleEl = document.getElementById('globalPdfTitle');
            var closeBtn = document.getElementById('globalPdfClose');

            function closeModal() {
                modal.classList.remove('open');
                frame.setAttribute('src', 'about:blank');
            }

            function openModal(pdfUrl, pdfTitle) {
                titleEl.textContent = pdfTitle || 'PDF Viewer';
                frame.setAttribute('src', pdfUrl || 'about:blank');
                modal.classList.add('open');
            }

            closeBtn.addEventListener('click', closeModal);

            modal.addEventListener('click', function (event) {
                if (event.target === modal) {
                    closeModal();
                }
            });

            document.addEventListener('keydown', function (event) {
                if (event.key === 'Escape') {
                    closeModal();
                }
            });

            window.addEventListener('message', function (event) {
                var data = event.data || {};
                if (!data || data.type !== 'open-pdf-modal') {
                    return;
                }
                openModal(data.pdfUrl, data.title);
            });
        })();
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ANTF Home</title>
    <link rel="icon" type="image/png" href="../logo.png" />
    <style>
        :root {
            --bg-top: #dce8ff;
            --bg-bottom: #f8e8ea;
            --card: #ffffff;
            --line: #d5def2;
            --heading: #113d8d;
            --accent: #c62834;
            --accent-blue: #1c5dc0;
            --text: #1b2942;
            --muted: #6b5b66;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background: linear-gradient(180deg, var(--bg-top), #edf3ff 55%, var(--bg-bottom));
            min-height: 100dvh;
            padding: 0;
        }

        .home-wrap {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0;
            min-height: 90dvh;
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 0;
            box-shadow: none;
            overflow: hidden;
            min-height: 90dvh;
        }

        .panel-head {
            padding: 12px 14px;
            border-bottom: 1px solid var(--line);
            background: linear-gradient(90deg, #edf3ff 0%, #fff0f2 100%);
        }

        .panel-head h2 {
            font-size: clamp(1.1rem, 2.2vw, 1.4rem);
            color: var(--heading);
            letter-spacing: 0.2px;
        }

        .panel-head p {
            margin-top: 4px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .carousel {
            height: 85vh;
            position: relative;
            width: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #0e3f8f 0%, #b7202d 100%);
        }

        .slides {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.7s ease;
        }

        .slide {
            min-width: 100%;
            height: 100%;
            position: relative;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: scale-down;
            display: block;
            filter: saturate(1.05) contrast(1.03);
        }

        .caption {
            position: absolute;
            left: 14px;
            right: 14px;
            bottom: 14px;
            background: rgba(16, 42, 96, 0.8);
            color: #e8f6ff;
            border: 1px solid rgba(255, 233, 236, 0.45);
            border-radius: 9px;
            padding: 9px 10px;
            font-size: 0.92rem;
            font-weight: 600;
            line-height: 1.35;
        }

        .dots {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 2;
            display: flex;
            justify-content: center;
            gap: 7px;
            padding: 6px 10px;
            background: rgba(15, 38, 87, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 999px;
            backdrop-filter: blur(4px);
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            border: 1px solid #c59fa5;
            background: #e9d7da;
        }

        .dot.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .mobile-slides {
            display: none;
            padding: 10px;
            gap: 10px;
        }

        .mobile-slide {
            border: 1px solid var(--line);
            border-radius: 10px;
            overflow: hidden;
            background: #fff;
        }

        .mobile-slide img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            background: #f7faff;
        }

        .mobile-slide-title {
            padding: 8px 10px;
            font-size: 0.84rem;
            font-weight: 700;
            color: #123f8f;
            background: linear-gradient(90deg, #edf3ff 0%, #fff0f2 100%);
            border-top: 1px solid var(--line);
        }

        .targets-box {
            padding: 14px;
        }

        .targets-list {
            list-style: none;
            display: grid;
            gap: 10px;
            margin-top: 2px;
        }

        .targets-list li {
            border-left: 5px solid var(--accent);
            background: linear-gradient(90deg, #f6f9ff 0%, #fff3f4 100%);
            border-radius: 8px;
            padding: 10px 11px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .tag {
            display: inline-block;
            margin-top: 6px;
            font-size: 0.78rem;
            padding: 3px 8px;
            border-radius: 999px;
            background: #e6efff;
            color: #143e8d;
            border: 1px solid #c0cff1;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .home-note {
            margin-top: 14px;
            font-size: 0.9rem;
            color: #7d1d28;
            background: #fff3f4;
            border: 1px solid #ebc8ce;
            border-radius: 8px;
            padding: 10px;
        }

        @media (max-width: 940px) {
            body {
                padding: 2px;
            }

            .home-wrap {
                grid-template-columns: 1fr;
            }

            .caption {
                font-size: 0.86rem;
            }

            .carousel {
                height: 85vh;
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 0;
            }

            .home-wrap,
            .panel {
                min-height: auto;
            }

            .panel {
                border-radius: 10px;
            }

            .carousel {
                display: none;
            }

            .mobile-slides {
                display: grid;
            }

            .dots {
                top: 8px;
                right: 8px;
                gap: 6px;
                padding: 5px 8px;
            }

            .dot {
                width: 9px;
                height: 9px;
            }
        }
    </style>
</head>

<body>
    <div class="home-wrap">
        <section class="panel" aria-label="Image carousel">
            <div class="carousel" id="carousel">
                <div class="slides" id="slides"></div>
                <div class="dots" id="dots" aria-label="Carousel indicators"></div>
            </div>
            <div class="mobile-slides" id="mobileSlides" aria-label="Vertical image list for mobile"></div>
        </section>

    </div>

    <script src="../data/home-data.js"></script>
    <script>
        (function renderHomeData() {
            var homeData = window.ANT_HOME_DATA || {};
            var slides = homeData.slides || [];

            var slidesWrap = document.getElementById('slides');
            var mobileSlidesWrap = document.getElementById('mobileSlides');

            slidesWrap.innerHTML = slides.map(function (slide) {
                return '<div class="slide"><img src="' + slide.src + '" alt="' + slide.alt + '" /></div>';
            }).join('');

            mobileSlidesWrap.innerHTML = slides.map(function (slide, index) {
                return '<article class="mobile-slide">' +
                    '<img src="' + slide.src + '" alt="' + slide.alt + '" />' +
                    '<div class="mobile-slide-title">Image ' + (index + 1) + '</div>' +
                    '</article>';
            }).join('');
        })();

        (function initCarousel() {
            var slidesWrap = document.getElementById('slides');
            var dotsWrap = document.getElementById('dots');
            var totalSlides = slidesWrap.children.length;
            var index = 0;

            if (!totalSlides) {
                return;
            }

            for (var i = 0; i < totalSlides; i += 1) {
                var dot = document.createElement('button');
                dot.className = 'dot';
                dot.type = 'button';
                dot.setAttribute('aria-label', 'Go to slide ' + (i + 1));
                dot.addEventListener('click', (function (slideIndex) {
                    return function () {
                        index = slideIndex;
                        render();
                        restart();
                    };
                })(i));
                dotsWrap.appendChild(dot);
            }

            function render() {
                slidesWrap.style.transform = 'translateX(-' + (index * 100) + '%)';
                var dots = dotsWrap.children;
                for (var d = 0; d < dots.length; d += 1) {
                    dots[d].classList.toggle('active', d === index);
                }
            }

            function next() {
                index = (index + 1) % totalSlides;
                render();
            }

            var timer = setInterval(next, 3200);

            function restart() {
                clearInterval(timer);
                timer = setInterval(next, 3200);
            }

            render();
        })();
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANTF Content</title>
  <style>
    :root {
      --bg: #eff3ff;
      --panel: #ffffff;
      --line: #d8deef;
      --heading: #123f8f;
      --text: #202b42;
      --muted: #6d5d67;
      --accent: #c62834;
      --accent-blue: #1b5dbf;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top right, #dce9ff 0%, #eff3ff 42%, #f9eaec 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    .page {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 10px 22px rgba(20, 51, 110, 0.08);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h2 {
      color: var(--heading);
      margin-bottom: 6px;
      font-size: clamp(1.2rem, 2.2vw, 1.65rem);
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 16px;
      font-size: 0.95rem;
    }

    .table-scroll {
      width: 100%;
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow-x: auto;
      background: #fff;
    }

    table {
      width: 100%;
      min-width: 620px;
      border-collapse: collapse;
      margin-top: 0;
      border: 0;
    }

    th,
    td {
      text-align: left;
      padding: 11px 10px;
      border-bottom: 1px solid var(--line);
      font-size: 0.95rem;
      vertical-align: top;
    }

    th {
      background: linear-gradient(90deg, #eef3ff 0%, #fff0f2 100%);
      color: #113b86;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.82rem;
      letter-spacing: 0.3px;
    }
    ul {
      list-style: none;
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    li {
      background: linear-gradient(90deg, #f5f8ff 0%, #fff4f5 100%);
      border-left: 5px solid var(--accent);
      border-radius: 8px;
      padding: 10px 12px;
      line-height: 1.45;
      font-size: 0.95rem;
    }

    .content-link {
      color: #0f3e91;
      font-weight: 700;
      text-decoration: none;
      border-bottom: 1px dashed #8da3d1;
    }

    .content-link:hover,
    .content-link:focus-visible {
      color: #9b1f2a;
      border-bottom-color: #9b1f2a;
      outline: none;
    }

    .badge-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .badge {
      background: #eef3ff;
      color: var(--accent-blue);
      border: 1px solid #c5d2f1;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .badge-link {
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .pdf-list {
      list-style: none;
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .pdf-item {
      border-left: 5px solid var(--accent);
      background: linear-gradient(90deg, #f5f8ff 0%, #fff4f5 100%);
      border-radius: 8px;
      padding: 0;
      overflow: hidden;
    }

    .pdf-link {
      width: 100%;
      border: 0;
      background: transparent;
      cursor: pointer;
      padding: 11px 12px;
      text-align: left;
      font-size: 0.95rem;
      line-height: 1.45;
      color: var(--text);
      font-weight: 600;
    }

    .pdf-link::before {
      content: attr(data-kind);
      display: inline-block;
      margin-right: 8px;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      border-radius: 999px;
      padding: 2px 8px;
      color: #fff;
      background: var(--accent-blue);
      vertical-align: middle;
    }

    .pdf-link[data-kind='LINK']::before {
      background: #18734a;
    }

    .pdf-link[data-kind='VIDEO']::before {
      background: #8a4b06;
    }

    .pdf-link[data-kind='EXTERNAL URL']::before {
      background: #18734a;
    }

    .external-url-tag {
      display: inline-block;
      margin-left: 6px;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #ffffff;
      background: #1f7a4a;
      vertical-align: middle;
    }

    .pdf-link:hover,
    .pdf-link:focus-visible {
      background: linear-gradient(90deg, #e9f0ff 0%, #ffe8eb 100%);
      outline: none;
    }

    .pdf-link.active {
      background: linear-gradient(90deg, #dfe9ff 0%, #ffdfe4 100%);
    }

    .pdf-viewer-wrap {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }

    .pdf-viewer-head {
      padding: 8px 10px;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--heading);
      background: linear-gradient(90deg, #eef3ff 0%, #fff0f2 100%);
      border-bottom: 1px solid var(--line);
    }

    .pdf-frame {
      width: 100%;
      height: 56vh;
      min-height: 380px;
      border: 0;
      display: block;
      background: #fff;
    }

    .fir-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
      margin-top: 10px;
    }

    .fir-card {
      border: 1px solid var(--line);
      background: linear-gradient(135deg, #f5f8ff 0%, #fff3f4 100%);
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      text-align: left;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .fir-card:hover,
    .fir-card:focus-visible {
      transform: translateY(-2px);
      border-color: #b5c6e8;
      box-shadow: 0 8px 16px rgba(20, 51, 110, 0.1);
      outline: none;
    }

    .fir-card.active {
      border-color: var(--accent-blue);
      box-shadow: 0 10px 20px rgba(20, 51, 110, 0.16);
      background: linear-gradient(135deg, #e9f0ff 0%, #ffe8eb 100%);
    }

    .fir-year {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--heading);
    }

    .fir-count {
      margin-top: 5px;
      font-size: 0.88rem;
      color: #7e202b;
      font-weight: 600;
    }

    .fir-cases-wrap {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }

    .fir-cases-head {
      padding: 8px 10px;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--heading);
      background: linear-gradient(90deg, #eef3ff 0%, #fff0f2 100%);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .fir-cases-title {
      min-width: 0;
    }

    .crime-diary-btn {
      text-decoration: none;
      border: 1px solid #b7c8ed;
      background: #ffffff;
      color: #12418f;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.76rem;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
    }

    .crime-diary-btn:hover,
    .crime-diary-btn:focus-visible {
      background: #f0f5ff;
      outline: none;
    }

    .crime-diary-actions {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .duty-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
      margin-top: 10px;
    }

    .duty-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: linear-gradient(135deg, #f5f8ff 0%, #fff4f5 100%);
      overflow: hidden;
      box-shadow: 0 8px 16px rgba(20, 51, 110, 0.08);
    }

    .duty-card-head {
      padding: 9px 10px;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--heading);
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, #eef3ff 0%, #fff0f2 100%);
    }

    .duty-members {
      list-style: none;
      margin: 0;
      padding: 8px;
      display: grid;
      gap: 8px;
    }

    .duty-members li {
      border-left: 4px solid var(--accent-blue);
      background: #ffffff;
      border-radius: 8px;
      padding: 8px 10px;
      line-height: 1.35;
      font-size: 0.9rem;
    }

    .duty-member-name {
      font-weight: 700;
      color: #143f8d;
    }

    .duty-member-meta {
      margin-top: 2px;
      font-size: 0.82rem;
      color: #6d5d67;
    }

    .error {
      color: #922f1e;
      background: #fce7e3;
      border: 1px solid #f4bdb2;
      border-radius: 10px;
      padding: 12px;
      font-weight: 600;
      margin-top: 12px;
    }

    @media (max-width: 760px) {
      body {
        padding: 10px;
      }

      .page {
        padding: 12px;
      }

      th,
      td {
        font-size: 0.88rem;
        padding: 9px 8px;
      }

      table {
        min-width: 560px;
      }

      .pdf-link {
        font-size: 0.9rem;
      }

      .fir-cards {
        grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
      }

      .duty-cards {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 540px) {
      body {
        padding: 6px;
      }

      .page {
        padding: 10px;
      }

      h2 {
        font-size: 1.05rem;
      }

      .subtitle {
        font-size: 0.86rem;
        margin-bottom: 10px;
      }

      .table-scroll {
        border: 0;
        background: transparent;
      }

      table {
        min-width: 0;
      }

      thead {
        display: none;
      }

      table,
      tbody,
      tr,
      td {
        display: block;
        width: 100%;
      }

      tbody {
        display: grid;
        gap: 10px;
      }

      tr {
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: hidden;
        background: #fff;
      }

      td {
        border-bottom: 1px solid #e4ebfa;
        padding: 8px 10px;
      }

      td:last-child {
        border-bottom: 0;
      }

      td::before {
        content: attr(data-label);
        display: block;
        font-size: 0.72rem;
        font-weight: 700;
        color: #6d5d67;
        text-transform: uppercase;
        margin-bottom: 3px;
        letter-spacing: 0.03em;
      }

      .fir-cards {
        grid-template-columns: 1fr;
      }

      .fir-cases-head {
        align-items: stretch;
      }

      .crime-diary-actions {
        width: 100%;
      }

      .crime-diary-btn {
        flex: 1;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <article class="page">
    <h2 id="title"></h2>
    <p id="subtitle" class="subtitle"></p>
    <div id="content"></div>
  </article>

  <script src="../data/content-manifest.js"></script>
  <script>
    var pageData = Object.create(null);

    function loadScript(url) {
      return new Promise(function (resolve, reject) {
        var script = document.createElement('script');
        script.src = url;
        script.async = false;
        script.onload = function () {
          resolve();
        };
        script.onerror = function () {
          reject(new Error('Failed to load script: ' + url));
        };
        document.head.appendChild(script);
      });
    }

    function loadPageDataByKey(pageKey) {
      var manifest = window.ANT_CONTENT_MANIFEST || {};
      var scriptPath = manifest[pageKey];

      if (!scriptPath) {
        return Promise.resolve(null);
      }

      window.ANT_CONTENT_PAGE = null;
      return loadScript(scriptPath).then(function () {
        if (!window.ANT_CONTENT_PAGE) {
          return null;
        }
        pageData[pageKey] = window.ANT_CONTENT_PAGE;
        return window.ANT_CONTENT_PAGE;
      });
    }

    function renderDutyCards(data) {
      var cards = data.groups.map(function (group) {
        var memberItems = group.members.map(function (member) {
          var meta = [];
          if (member.rank) {
            meta.push(member.rank);
          }
          if (member.shift) {
            meta.push(member.shift);
          }

          return '<li>' +
            '<div class="duty-member-name">' + escapeHtml(member.name) + '</div>' +
            '<div class="duty-member-meta">' + escapeHtml(meta.join(' | ')) + '</div>' +
            '</li>';
        }).join('');

        return '<section class="duty-card">' +
          '<div class="duty-card-head">' + escapeHtml(group.label) + '</div>' +
          '<ul class="duty-members">' + memberItems + '</ul>' +
          '</section>';
      }).join('');

      return '<div class="duty-cards">' + cards + '</div>';
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderTable(data) {
      var headerHtml = data.headers
        .map(function (head) {
          return '<th>' + escapeHtml(head) + '</th>';
        })
        .join('');

      var bodyHtml = data.rows
        .map(function (row) {
          var cols = row
            .map(function (col, index) {
              var label = data.headers && data.headers[index] ? data.headers[index] : '';
              return '<td data-label="' + escapeHtml(label) + '">' + escapeHtml(col) + '</td>';
            })
            .join('');
          return '<tr>' + cols + '</tr>';
        })
        .join('');

      return '<div class="table-scroll"><table><thead><tr>' + headerHtml + '</tr></thead><tbody>' + bodyHtml + '</tbody></table></div>';
    }

    function renderList(items) {
      return '<ul>' + items.map(function (item) {
        if (item && typeof item === 'object') {
          var label = item.label || item.text || item.title || '';
          if (item.href) {
            return '<li><a class="content-link" href="' + escapeHtml(item.href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a></li>';
          }
          return '<li>' + escapeHtml(label) + '</li>';
        }

        return '<li>' + escapeHtml(item) + '</li>';
      }).join('') + '</ul>';
    }

    function renderPdfList(data, pageKey) {
      var buttons = data.items.map(function (item, index) {
        var url = item.pdf || item.href || item.url || '';
        var type = item.type || (item.pdf ? 'pdf' : 'link');
        var kind = String(item.tag || type).toUpperCase();
        var activeClass = index === 0 ? ' active' : '';
        return '<li class="pdf-item"><button class="pdf-link' + activeClass + '" type="button" data-type="' + escapeHtml(type) + '" data-url="' + escapeHtml(url) + '" data-kind="' + escapeHtml(kind) + '">' + escapeHtml(item.label) + '</button></li>';
      }).join('');

      var firstPdf = '';
      for (var p = 0; p < data.items.length; p += 1) {
        var entry = data.items[p];
        var entryType = entry.type || (entry.pdf ? 'pdf' : 'link');
        if (entryType === 'pdf') {
          firstPdf = entry.pdf || entry.url || entry.href || '';
          break;
        }
      }

      if (data.openInPopup) {
        return '<ul class="pdf-list">' + buttons + '</ul>';
      }

      return '<ul class="pdf-list">' + buttons + '</ul>' +
        '<div class="pdf-viewer-wrap">' +
        '<div class="pdf-viewer-head">PDF Preview</div>' +
        '<iframe id="pdfFrame" class="pdf-frame" title="PDF preview" src="' + escapeHtml(firstPdf) + '"></iframe>' +
        '</div>';
    }

    function wirePdfList(pageKey, data) {
      var isPopupMode = !!(data && data.openInPopup) || pageKey === 'orders-standing' || pageKey === 'orders-circular';
      var links = document.querySelectorAll('.pdf-link');

      if (isPopupMode) {
        for (var m = 0; m < links.length; m += 1) {
          links[m].addEventListener('click', function () {
            var targetType = (this.getAttribute('data-type') || 'pdf').toLowerCase();
            var targetUrl = this.getAttribute('data-url');

            for (var n = 0; n < links.length; n += 1) {
              links[n].classList.remove('active');
            }
            this.classList.add('active');

            if (targetType === 'link' || targetType === 'video') {
              window.open(targetUrl, '_blank', 'noopener,noreferrer');
              return;
            }

            if (window.parent && window.parent !== window) {
              window.parent.postMessage({
                type: 'open-pdf-modal',
                pdfUrl: targetUrl,
                title: this.textContent.trim()
              }, '*');
            } else {
              window.open(targetUrl, '_blank', 'noopener');
            }
          });
        }

        return;
      }

      var frame = document.getElementById('pdfFrame');

      for (var i = 0; i < links.length; i += 1) {
        links[i].addEventListener('click', function () {
          var targetType = (this.getAttribute('data-type') || 'pdf').toLowerCase();
          var targetUrl = this.getAttribute('data-url');

          if (targetType === 'link' || targetType === 'video') {
            window.open(targetUrl, '_blank', 'noopener,noreferrer');
            return;
          }

          frame.setAttribute('src', targetUrl);

          for (var j = 0; j < links.length; j += 1) {
            links[j].classList.remove('active');
          }

          this.classList.add('active');
        });
      }
    }

    function renderBadges(items) {
      return '<div class="badge-row">' + items.map(function (item) {
        if (item && typeof item === 'object') {
          var label = item.label || item.text || item.title || '';
          if (item.href) {
            var tagText = item.tag || 'EXTERNAL URL';
            return '<a class="badge badge-link" href="' + escapeHtml(item.href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '<span class="external-url-tag">' + escapeHtml(tagText) + '</span></a>';
          }
          return '<span class="badge">' + escapeHtml(label) + '</span>';
        }

        return '<span class="badge">' + escapeHtml(item) + '</span>';
      }).join('') + '</div>';
    }

    function renderFirCards(data, pageKey) {
      var countLabel = data.countLabel || 'FIRs';
      var cards = data.years.map(function (group, index) {
        var activeClass = index === 0 ? ' active' : '';
        return '<button type="button" class="fir-card' + activeClass + '" data-year="' + escapeHtml(group.year) + '">' +
          '<div class="fir-year">Year ' + escapeHtml(group.year) + '</div>' +
          '<div class="fir-count">' + escapeHtml(countLabel) + ': ' + escapeHtml(group.firCount) + '</div>' +
          '</button>';
      }).join('');

      var defaultGroup = data.years[0] || { year: '', cases: [] };
      var tableData = {
        headers: data.headers,
        rows: defaultGroup.cases
      };

      var showDiaryDownload = pageKey === 'under-investigation';
      var diaryUrl = defaultGroup.crimeDiaryUrl || '';
      var diaryButtonHtml = '';
      if (showDiaryDownload && diaryUrl) {
        diaryButtonHtml = '<div id="crimeDiaryActions" class="crime-diary-actions">' +
          '<button id="crimeDiaryViewBtn" class="crime-diary-btn" type="button">View Crime Diary</button>' +
          '<a id="crimeDiaryBtn" class="crime-diary-btn" href="' + escapeHtml(diaryUrl) + '" target="_blank" rel="noopener noreferrer" download>Download Crime Diary</a>' +
          '</div>';
      }

      return '<div class="fir-cards">' + cards + '</div>' +
        '<div class="fir-cases-wrap">' +
        '<div class="fir-cases-head" id="firCasesHeadWrap">' +
        '<div class="fir-cases-title" id="firCasesHead">Cases for Year ' + escapeHtml(defaultGroup.year) + '</div>' +
        diaryButtonHtml +
        '</div>' +
        '<div id="firCasesTable">' + renderTable(tableData) + '</div>' +
        '</div>';
    }

    function wireFirCards(data, pageKey) {
      var cardEls = document.querySelectorAll('.fir-card');
      var headEl = document.getElementById('firCasesHead');
      var tableEl = document.getElementById('firCasesTable');
      var diaryActionsEl = document.getElementById('crimeDiaryActions');
      var diaryBtnEl = document.getElementById('crimeDiaryBtn');
      var diaryViewBtnEl = document.getElementById('crimeDiaryViewBtn');
      var showDiaryDownload = pageKey === 'under-investigation';
      var selectedDiaryUrl = diaryBtnEl ? diaryBtnEl.getAttribute('href') : '';
      var selectedYear = data.years[0] ? data.years[0].year : '';

      function openCrimeDiaryViewer(diaryUrl, year) {
        if (!diaryUrl) {
          return;
        }

        if (window.parent && window.parent !== window) {
          window.parent.postMessage({
            type: 'open-pdf-modal',
            pdfUrl: diaryUrl,
            title: 'Crime Diary ' + year
          }, '*');
          return;
        }

        window.open(diaryUrl, '_blank', 'noopener');
      }

      if (showDiaryDownload && diaryViewBtnEl) {
        diaryViewBtnEl.addEventListener('click', function () {
          openCrimeDiaryViewer(selectedDiaryUrl, selectedYear);
        });
      }

      function renderYearCases(year) {
        var selected = null;
        for (var i = 0; i < data.years.length; i += 1) {
          if (data.years[i].year === year) {
            selected = data.years[i];
            break;
          }
        }

        if (!selected) {
          return;
        }

        headEl.textContent = 'Cases for Year ' + selected.year;
        tableEl.innerHTML = renderTable({ headers: data.headers, rows: selected.cases });

        if (showDiaryDownload && diaryBtnEl) {
          var diaryUrl = selected.crimeDiaryUrl || '';
          selectedDiaryUrl = diaryUrl;
          selectedYear = selected.year;

          if (diaryUrl) {
            diaryBtnEl.setAttribute('href', diaryUrl);
            if (diaryActionsEl) {
              diaryActionsEl.style.display = 'inline-flex';
            }
          } else {
            if (diaryActionsEl) {
              diaryActionsEl.style.display = 'none';
            }
          }
        }
      }

      for (var j = 0; j < cardEls.length; j += 1) {
        cardEls[j].addEventListener('click', function () {
          var year = this.getAttribute('data-year');
          for (var k = 0; k < cardEls.length; k += 1) {
            cardEls[k].classList.remove('active');
          }
          this.classList.add('active');
          renderYearCases(year);
        });
      }
    }

    function renderLoadedPage(pageKey, data) {
      var titleEl = document.getElementById('title');
      var subtitleEl = document.getElementById('subtitle');
      var contentEl = document.getElementById('content');

      if (!data) {
        titleEl.textContent = 'Page Not Found';
        subtitleEl.textContent = 'The requested menu page is not configured yet.';
        contentEl.innerHTML = '<div class="error">Invalid page key: ' + escapeHtml(pageKey) + '</div>';
        return;
      }

      titleEl.textContent = data.title;
      subtitleEl.textContent = data.subtitle;

      if (data.type === 'table') {
        contentEl.innerHTML = renderTable(data);
        return;
      }

      if (data.type === 'list') {
        contentEl.innerHTML = renderList(data.items);
        return;
      }

      if (data.type === 'badges') {
        contentEl.innerHTML = renderBadges(data.items);
        return;
      }

      if (data.type === 'pdf-list') {
        contentEl.innerHTML = renderPdfList(data, pageKey);
        wirePdfList(pageKey, data);
        return;
      }

      if (data.type === 'fir-cards') {
        contentEl.innerHTML = renderFirCards(data, pageKey);
        wireFirCards(data, pageKey);
        return;
      }

      if (data.type === 'duty-cards') {
        contentEl.innerHTML = renderDutyCards(data);
        return;
      }

      contentEl.innerHTML = '<div class="error">Unsupported section type configured.</div>';
    }

    function boot() {
      var params = new URLSearchParams(window.location.search);
      var pageKey = params.get('page') || 'hr-officers';

      loadPageDataByKey(pageKey)
        .then(function (data) {
          renderLoadedPage(pageKey, data);
        })
        .catch(function () {
          var titleEl = document.getElementById('title');
          var subtitleEl = document.getElementById('subtitle');
          var contentEl = document.getElementById('content');

          titleEl.textContent = 'Load Error';
          subtitleEl.textContent = 'Unable to load section data.';
          contentEl.innerHTML = '<div class="error">Could not load data for page key: ' + escapeHtml(pageKey) + '</div>';
        });
    }

    boot();
  </script>
</body>
</html>
